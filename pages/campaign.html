<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Management — Vault 215</title>
    <style>
        /* ===========================
           VAULT 215 CAMPAIGN PAGE
           GREEN & GOLD THEME
           =========================== */

        :root {
            --vault-primary: #4ade80;
            --vault-secondary: #fbbf24;
            --vault-dark: #0a0a0a;
            --vault-darker: #1a1a1a;
            --vault-success: #4ade80;
            --vault-error: #ff6b6b;
            --vault-warning: #fbbf24;
            --vault-green: #4ade80;
            --vault-gold: #fbbf24;
            --vault-green-dark: #2d5016;
            --vault-green-mid: #3d6b1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background-color: var(--vault-dark);
            color: var(--vault-green);
            font-family: 'Courier New', monospace;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(58, 102, 20, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(58, 102, 20, 0.1) 0%, transparent 50%);
        }

        body {
            padding: 20px;
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ===== VAULT HEADER ===== */
        .vault-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background-color: var(--vault-darker);
            border: 3px solid var(--vault-green);
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.4);
        }

        .vault-badge {
            font-size: 10px;
            color: var(--vault-gold);
            text-shadow: 0 0 5px var(--vault-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .vault-title {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            color: var(--vault-green);
            text-shadow: 0 0 10px var(--vault-green), 0 0 20px rgba(74, 222, 128, 0.5);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .vault-subtitle {
            font-size: 12px;
            color: var(--vault-gold);
            text-shadow: 0 0 5px var(--vault-gold);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ===== NOTIFICATIONS ===== */
        #notification {
            display: none;
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 100;
            padding: 14px 20px;
            background-color: var(--vault-darker);
            border: 2px solid var(--vault-green);
            color: var(--vault-green);
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
            max-width: 360px;
            text-shadow: 0 0 5px var(--vault-green);
            animation: slideIn 0.3s ease;
        }

        #notification.error {
            border-color: var(--vault-error);
            color: var(--vault-error);
            text-shadow: 0 0 5px var(--vault-error);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        #notification.warning {
            border-color: var(--vault-warning);
            color: var(--vault-warning);
            text-shadow: 0 0 5px var(--vault-warning);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ===== SECTION PANELS ===== */
        .panel {
            background-color: var(--vault-darker);
            border: 2px solid var(--vault-green);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.2);
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--vault-gold);
            text-shadow: 0 0 8px var(--vault-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(74, 222, 128, 0.3);
        }

        /* ===== FORM ELEMENTS ===== */
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--vault-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-shadow: 0 0 3px var(--vault-gold);
        }

        input[type="text"],
        input[type="search"],
        textarea,
        select {
            width: 100%;
            background-color: #111;
            border: 1px solid var(--vault-green);
            color: var(--vault-green);
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 10px 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="search"]:focus,
        textarea:focus,
        select:focus {
            border-color: var(--vault-gold);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(74, 222, 128, 0.35);
        }

        /* ===== BUTTONS ===== */
        .btn {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            padding: 10px 18px;
            border: 2px solid;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--vault-green-dark);
            border-color: var(--vault-green);
            color: var(--vault-green);
            text-shadow: 0 0 5px var(--vault-green);
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--vault-green-mid);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .btn-gold {
            background-color: #2a1f00;
            border-color: var(--vault-gold);
            color: var(--vault-gold);
            text-shadow: 0 0 5px var(--vault-gold);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.2);
        }

        .btn-gold:hover {
            background-color: #3a2a00;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        .btn-danger {
            background-color: #1a0000;
            border-color: var(--vault-error);
            color: var(--vault-error);
            text-shadow: 0 0 5px var(--vault-error);
        }

        .btn-danger:hover {
            background-color: #2a0000;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 11px;
        }

        .btn-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        /* ===== PLAYER SELECT GRID ===== */
        .player-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .player-controls input[type="search"] {
            flex: 1;
            min-width: 160px;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 4px 2px;
        }

        .player-grid::-webkit-scrollbar {
            width: 6px;
        }

        .player-grid::-webkit-scrollbar-track {
            background: #111;
        }

        .player-grid::-webkit-scrollbar-thumb {
            background: var(--vault-green);
            border-radius: 2px;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background-color: #111;
            border: 1px solid rgba(74, 222, 128, 0.4);
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .player-card:hover {
            border-color: var(--vault-gold);
            background-color: #161616;
        }

        .player-card.selected {
            border-color: var(--vault-gold);
            background-color: #1a1200;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.2);
        }

        .player-card input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--vault-gold);
            cursor: pointer;
            flex-shrink: 0;
        }

        .player-info {
            flex: 1;
            overflow: hidden;
        }

        .player-name {
            font-size: 13px;
            font-weight: bold;
            color: var(--vault-green);
            text-shadow: 0 0 4px var(--vault-green);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-meta {
            font-size: 10px;
            color: rgba(74, 222, 128, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .selection-counter {
            font-size: 12px;
            color: var(--vault-gold);
            text-shadow: 0 0 4px var(--vault-gold);
            margin-left: auto;
        }

        .empty-players {
            text-align: center;
            color: rgba(74, 222, 128, 0.5);
            font-size: 12px;
            padding: 24px;
            font-style: italic;
            grid-column: 1 / -1;
        }

        /* ===== CAMPAIGN LIST ===== */
        .campaign-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .campaign-item {
            border: 1px solid rgba(74, 222, 128, 0.4);
            background-color: #111;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .campaign-item:hover {
            border-color: var(--vault-green);
        }

        .campaign-item.active-campaign {
            border-color: var(--vault-gold);
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.2);
        }

        .campaign-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            cursor: pointer;
            gap: 10px;
        }

        .campaign-header:hover {
            background-color: #161616;
        }

        .campaign-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .campaign-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--vault-green);
            box-shadow: 0 0 6px var(--vault-green);
            flex-shrink: 0;
        }

        .campaign-status-dot.inactive {
            background-color: rgba(74, 222, 128, 0.3);
            box-shadow: none;
        }

        .campaign-name-display {
            font-size: 14px;
            font-weight: bold;
            color: var(--vault-green);
            text-shadow: 0 0 5px var(--vault-green);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .campaign-meta-display {
            font-size: 10px;
            color: rgba(74, 222, 128, 0.6);
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .campaign-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .campaign-badge {
            font-size: 10px;
            padding: 3px 8px;
            border: 1px solid;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .campaign-badge.active {
            border-color: var(--vault-gold);
            color: var(--vault-gold);
            text-shadow: 0 0 4px var(--vault-gold);
        }

        .campaign-badge.inactive {
            border-color: rgba(74, 222, 128, 0.3);
            color: rgba(74, 222, 128, 0.5);
        }

        .chevron {
            font-size: 12px;
            color: var(--vault-green);
            transition: transform 0.2s;
        }

        .chevron.open {
            transform: rotate(180deg);
        }

        /* Campaign Details (expanded) */
        .campaign-details {
            display: none;
            padding: 16px;
            border-top: 1px solid rgba(74, 222, 128, 0.3);
            background-color: #0d0d0d;
        }

        .campaign-details.open {
            display: block;
        }

        .detail-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .detail-label {
            color: var(--vault-gold);
            text-shadow: 0 0 3px var(--vault-gold);
            min-width: 100px;
            flex-shrink: 0;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 1px;
            padding-top: 1px;
        }

        .detail-value {
            color: var(--vault-green);
        }

        /* Edit fields inside campaign details */
        .edit-fields {
            display: none;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(74, 222, 128, 0.2);
        }

        .edit-fields.open {
            display: block;
        }

        /* Members section inside campaign details */
        .members-section {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(74, 222, 128, 0.2);
        }

        .members-section-title {
            font-size: 11px;
            color: var(--vault-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-shadow: 0 0 3px var(--vault-gold);
        }

        .members-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .member-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background-color: var(--vault-green-dark);
            border: 1px solid var(--vault-green);
            font-size: 11px;
            color: var(--vault-green);
            text-shadow: 0 0 3px var(--vault-green);
        }

        .member-remove-btn {
            background: none;
            border: none;
            color: var(--vault-error);
            cursor: pointer;
            font-size: 13px;
            padding: 0;
            line-height: 1;
            text-shadow: 0 0 4px var(--vault-error);
        }

        .member-remove-btn:hover {
            color: #ff3030;
        }

        .add-member-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .add-member-row select {
            flex: 1;
            min-width: 150px;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 32px;
            color: rgba(74, 222, 128, 0.5);
            font-size: 13px;
            font-style: italic;
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            body { padding: 12px; }
            .vault-title { font-size: 20px; letter-spacing: 2px; }
            .panel { padding: 16px; }
            .form-row { flex-direction: column; gap: 10px; }
            .form-group { min-width: unset; }
            .player-grid { grid-template-columns: 1fr; }
            .btn-actions { flex-direction: column; }
            .btn-actions .btn { text-align: center; }
            .campaign-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .campaign-header-right { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <!-- Notification toast -->
    <div id="notification"></div>

    <div class="container">

        <!-- VAULT HEADER -->
        <div class="vault-header">
            <div class="vault-badge">VAULT-TEC INDUSTRIES PIP-BOY 3000</div>
            <div class="vault-title">CAMPAIGN MANAGEMENT</div>
            <div class="vault-subtitle">OVERSEER COMMAND TERMINAL • VAULT 215</div>
        </div>

        <!-- ===================== CREATE CAMPAIGN ===================== -->
        <div class="panel">
            <div class="panel-title">⊕ Create New Campaign</div>

            <div class="form-row">
                <div class="form-group">
                    <label for="campName">Campaign Name *</label>
                    <input type="text" id="campName" placeholder="e.g. Wasteland Survival" maxlength="80">
                </div>
                <div class="form-group">
                    <label for="campOverseer">Overseer ID *</label>
                    <input type="text" id="campOverseer" placeholder="e.g. Overseer_Hayes" maxlength="60">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="campDescription">Description</label>
                    <textarea id="campDescription" placeholder="Describe the campaign setting, objective, or notes…" maxlength="500"></textarea>
                </div>
            </div>

            <!-- Player Selection -->
            <label style="margin-bottom:10px; display:block;">Select Players</label>

            <div class="player-controls">
                <input type="search" id="playerSearch" placeholder="Search players…" oninput="filterPlayers()">
                <button class="btn btn-sm btn-primary" onclick="selectAllPlayers()">Select All</button>
                <button class="btn btn-sm btn-gold" onclick="deselectAllPlayers()">Deselect All</button>
                <span class="selection-counter" id="selectionCounter">0 selected</span>
            </div>

            <div class="player-grid" id="playerGrid">
                <div class="empty-players">Loading characters…</div>
            </div>

            <div class="btn-actions">
                <button class="btn btn-primary" onclick="createCampaign()">⊕ Create Campaign</button>
            </div>
        </div>

        <!-- ===================== ACTIVE CAMPAIGNS ===================== -->
        <div class="panel">
            <div class="panel-title">☰ Active Campaigns</div>
            <div class="campaign-list" id="campaignList">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div>No campaigns found. Create one above.</div>
                </div>
            </div>
        </div>

    </div><!-- /.container -->

    <script>
        /* ==================================================
           VAULT 215 — CAMPAIGN MANAGEMENT
           Vanilla JS · localStorage only · No dependencies
           ================================================== */

        var CAMPAIGNS_KEY = 'vault215_campaigns';
        var CHARACTERS_KEY = 'vault215_characters';
        var selectedPlayerIds = [];

        /* ── HELPERS ──────────────────────────────── */
        function fallbackCharId(name) {
            return 'char_' + String(name || '').replace(/\s+/g, '_').toLowerCase().substring(0, 20);
        }

        /* ── NOTIFICATION ─────────────────────────── */
        var _notifTimer = null;
        function showNotification(msg, type) {
            var el = document.getElementById('notification');
            el.textContent = msg;
            el.className = type || '';
            el.style.display = 'block';
            if (_notifTimer) clearTimeout(_notifTimer);
            _notifTimer = setTimeout(function() { el.style.display = 'none'; }, 3500);
        }

        /* ── CAMPAIGNS ────────────────────────────── */
        function loadCampaigns() {
            try {
                var raw = localStorage.getItem(CAMPAIGNS_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) { console.warn('[Campaign] Failed to load campaigns:', e); }
            return [];
        }

        function saveCampaigns(campaigns) {
            try {
                localStorage.setItem(CAMPAIGNS_KEY, JSON.stringify(campaigns));
            } catch (e) { console.warn('[Campaign] Failed to save campaigns:', e); }
        }

        /* ── CHARACTERS ───────────────────────────── */
        function loadAllCharacters() {
            var chars = [];

            // 1. vault215_characters — array of registered characters
            try {
                var raw = localStorage.getItem(CHARACTERS_KEY);
                if (raw) {
                    var arr = JSON.parse(raw);
                    if (Array.isArray(arr)) chars = arr;
                }
            } catch (e) { console.warn('[Campaign] Failed to load vault215_characters:', e); }

            // 2. character_* keys — individual character entries
            try {
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key && key.indexOf('character_') === 0) {
                        try {
                            var c = JSON.parse(localStorage.getItem(key));
                            if (c && c.id) {
                                var exists = chars.some(function(x) { return x.id === c.id; });
                                if (!exists) chars.push(c);
                            }
                        } catch (e2) { console.warn('[Campaign] Failed to parse', key, e2); }
                    }
                }
            } catch (e) { console.warn('[Campaign] Failed to scan character_* keys:', e); }

            // 3. Fallback: characterData (single-player active session)
            if (chars.length === 0) {
                try {
                    var cd = JSON.parse(localStorage.getItem('characterData') || 'null');
                    if (cd && cd.name) {
                        var fallbackId = fallbackCharId(cd.name);
                        chars.push({
                            id: fallbackId,
                            name: cd.name,
                            race: cd.race || '',
                            class: cd.class || ''
                        });
                    }
                } catch (e) { console.warn('[Campaign] Failed to read characterData:', e); }
            }

            return chars;
        }

        function updateCharacterCampaignId(charId, campaignId) {
            // Update in vault215_characters array
            try {
                var raw = localStorage.getItem(CHARACTERS_KEY);
                if (raw) {
                    var arr = JSON.parse(raw);
                    if (Array.isArray(arr)) {
                        arr = arr.map(function(c) {
                            if (c.id === charId) {
                                c.campaignId = campaignId || null;
                            }
                            return c;
                        });
                        localStorage.setItem(CHARACTERS_KEY, JSON.stringify(arr));
                    }
                }
            } catch (e) { console.warn('[Campaign] Failed to update vault215_characters:', e); }

            // Update individual character_* key if present
            try {
                var cRaw = localStorage.getItem('character_' + charId);
                if (cRaw) {
                    var cObj = JSON.parse(cRaw);
                    cObj.campaignId = campaignId || null;
                    localStorage.setItem('character_' + charId, JSON.stringify(cObj));
                }
            } catch (e) { console.warn('[Campaign] Failed to update character_' + charId + ':', e); }

            // Update characterData if it matches (single-player session)
            try {
                var cdRaw = localStorage.getItem('characterData');
                if (cdRaw) {
                    var cdObj = JSON.parse(cdRaw);
                    if (fallbackCharId(cdObj.name) === charId) {
                        cdObj.campaignId = campaignId || null;
                        localStorage.setItem('characterData', JSON.stringify(cdObj));
                    }
                }
            } catch (e) { console.warn('[Campaign] Failed to update characterData:', e); }
        }

        /* ── ESCAPE HTML ──────────────────────────── */
        function esc(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        /* ── DATE ─────────────────────────────────── */
        function today() {
            return new Date().toISOString().slice(0, 10);
        }

        /* ── PLAYER GRID ──────────────────────────── */
        var allCharacters = [];

        function renderPlayerGrid(filter) {
            var grid = document.getElementById('playerGrid');
            filter = (filter || '').trim().toLowerCase();
            var visible = filter
                ? allCharacters.filter(function(c) {
                    return (c.name || '').toLowerCase().indexOf(filter) !== -1 ||
                           (c.race || '').toLowerCase().indexOf(filter) !== -1 ||
                           (c.class || '').toLowerCase().indexOf(filter) !== -1;
                })
                : allCharacters;

            if (visible.length === 0) {
                grid.innerHTML = '<div class="empty-players">' +
                    (allCharacters.length === 0
                        ? 'No characters found in localStorage. Create a character first.'
                        : 'No characters match your search.') +
                    '</div>';
                updateSelectionCounter();
                return;
            }

            var html = '';
            visible.forEach(function(c) {
                var id = esc(c.id);
                var checked = selectedPlayerIds.indexOf(c.id) !== -1 ? 'checked' : '';
                var cardClass = checked ? 'player-card selected' : 'player-card';
                var meta = [c.race, c.class].filter(Boolean).join(' • ') || 'Vault 215 Resident';
                html += '<div class="' + cardClass + '" onclick="togglePlayer(\'' + id + '\')" id="pcard_' + id + '">' +
                    '<input type="checkbox" ' + checked + ' aria-label="Select ' + esc(c.name || 'character') + '" onclick="event.stopPropagation(); togglePlayer(\'' + id + '\')">' +
                    '<div class="player-info">' +
                        '<div class="player-name">' + esc(c.name || 'Unknown') + '</div>' +
                        '<div class="player-meta">' + esc(meta) + '</div>' +
                    '</div>' +
                '</div>';
            });
            grid.innerHTML = html;
            updateSelectionCounter();
        }

        function togglePlayer(charId) {
            var idx = selectedPlayerIds.indexOf(charId);
            if (idx === -1) {
                selectedPlayerIds.push(charId);
            } else {
                selectedPlayerIds.splice(idx, 1);
            }
            // Update UI
            var card = document.getElementById('pcard_' + charId);
            if (card) {
                if (selectedPlayerIds.indexOf(charId) !== -1) {
                    card.classList.add('selected');
                    card.querySelector('input[type="checkbox"]').checked = true;
                } else {
                    card.classList.remove('selected');
                    card.querySelector('input[type="checkbox"]').checked = false;
                }
            }
            updateSelectionCounter();
        }

        function filterPlayers() {
            renderPlayerGrid(document.getElementById('playerSearch').value);
        }

        function selectAllPlayers() {
            allCharacters.forEach(function(c) {
                if (selectedPlayerIds.indexOf(c.id) === -1) {
                    selectedPlayerIds.push(c.id);
                }
            });
            renderPlayerGrid(document.getElementById('playerSearch').value);
        }

        function deselectAllPlayers() {
            selectedPlayerIds = [];
            renderPlayerGrid(document.getElementById('playerSearch').value);
        }

        function updateSelectionCounter() {
            document.getElementById('selectionCounter').textContent = selectedPlayerIds.length + ' selected';
        }

        /* ── CREATE CAMPAIGN ──────────────────────── */
        function createCampaign() {
            var name = (document.getElementById('campName').value || '').trim();
            var overseerId = (document.getElementById('campOverseer').value || '').trim();
            var description = (document.getElementById('campDescription').value || '').trim();

            if (!name) {
                showNotification('⚠ Campaign name is required.', 'warning');
                document.getElementById('campName').focus();
                return;
            }
            if (!overseerId) {
                showNotification('⚠ Overseer ID is required.', 'warning');
                document.getElementById('campOverseer').focus();
                return;
            }

            var campaigns = loadCampaigns();

            // Duplicate check
            if (campaigns.some(function(c) {
                return c.name.toLowerCase() === name.toLowerCase();
            })) {
                showNotification('✕ A campaign with that name already exists.', 'error');
                return;
            }

            var isFirst = campaigns.length === 0;
            var campaignId = 'camp_' + Date.now() + '_' + Math.floor(Math.random() * 1000000);
            var now = today();

            var newCampaign = {
                id:          campaignId,
                campaignId:  campaignId,
                name:        name,
                description: description,
                overseerId:  overseerId,
                players:     selectedPlayerIds.slice(),
                createdAt:   now,
                updatedAt:   now,
                status:      'active',
                isActive:    isFirst,
                chatHistory: []
            };

            campaigns.push(newCampaign);
            saveCampaigns(campaigns);

            // Link campaignId to each selected character
            selectedPlayerIds.forEach(function(charId) {
                updateCharacterCampaignId(charId, campaignId);
            });

            // Reset form
            document.getElementById('campName').value = '';
            document.getElementById('campOverseer').value = '';
            document.getElementById('campDescription').value = '';
            selectedPlayerIds = [];
            renderPlayerGrid();

            renderCampaignList();
            showNotification('✓ Campaign "' + name + '" created successfully!');
        }

        /* ── CAMPAIGN LIST ────────────────────────── */
        function renderCampaignList() {
            var campaigns = loadCampaigns();
            var list = document.getElementById('campaignList');

            if (campaigns.length === 0) {
                list.innerHTML = '<div class="empty-state">' +
                    '<div class="empty-state-icon">📋</div>' +
                    '<div>No campaigns found. Create one above.</div>' +
                '</div>';
                return;
            }

            var html = '';
            campaigns.forEach(function(camp) {
                var cid = esc(camp.id);
                var statusClass = camp.status === 'active' ? 'active' : 'inactive';
                var dotClass = camp.status === 'active' ? '' : 'inactive';
                var playerCount = (camp.players || []).length;
                html += '<div class="campaign-item ' + (camp.isActive ? 'active-campaign' : '') + '" id="ci_' + cid + '">' +
                    '<div class="campaign-header" onclick="toggleCampaignDetails(\'' + cid + '\')">' +
                        '<div class="campaign-header-left">' +
                            '<div class="campaign-status-dot ' + dotClass + '"></div>' +
                            '<div>' +
                                '<div class="campaign-name-display">' + esc(camp.name) + '</div>' +
                                '<div class="campaign-meta-display">Overseer: ' + esc(camp.overseerId || '—') + ' • ' + playerCount + ' player(s) • Created: ' + esc(camp.createdAt || '—') + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="campaign-header-right">' +
                            '<span class="campaign-badge ' + statusClass + '">' + esc(camp.status || 'active') + '</span>' +
                            '<span class="chevron" id="chev_' + cid + '">▼</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="campaign-details" id="cd_' + cid + '">' +
                        buildCampaignDetails(camp) +
                    '</div>' +
                '</div>';
            });
            list.innerHTML = html;
        }

        function buildCampaignDetails(camp) {
            var cid = esc(camp.id);
            var players = camp.players || [];

            // Detail rows
            var html = '';
            html += '<div class="detail-row"><span class="detail-label">Campaign ID</span><span class="detail-value">' + esc(camp.id) + '</span></div>';
            html += '<div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">' + esc(camp.description || '—') + '</span></div>';
            html += '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">' + esc(camp.status || 'active') + '</span></div>';
            html += '<div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">' + esc(camp.createdAt || '—') + '</span></div>';
            html += '<div class="detail-row"><span class="detail-label">Updated</span><span class="detail-value">' + esc(camp.updatedAt || '—') + '</span></div>';

            // Edit fields
            html += '<div class="edit-fields" id="ef_' + cid + '">' +
                '<div class="form-row">' +
                    '<div class="form-group">' +
                        '<label>Campaign Name</label>' +
                        '<input type="text" id="en_' + cid + '" value="' + esc(camp.name) + '" maxlength="80">' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label>Overseer ID</label>' +
                        '<input type="text" id="eo_' + cid + '" value="' + esc(camp.overseerId || '') + '" maxlength="60">' +
                    '</div>' +
                '</div>' +
                '<div class="form-row">' +
                    '<div class="form-group">' +
                        '<label>Description</label>' +
                        '<textarea id="ed_' + cid + '" maxlength="500">' + esc(camp.description || '') + '</textarea>' +
                    '</div>' +
                '</div>' +
                '<div class="form-row">' +
                    '<div class="form-group">' +
                        '<label>Status</label>' +
                        '<select id="es_' + cid + '">' +
                            '<option value="active"' + (camp.status === 'active' ? ' selected' : '') + '>Active</option>' +
                            '<option value="inactive"' + (camp.status === 'inactive' ? ' selected' : '') + '>Inactive</option>' +
                            '<option value="completed"' + (camp.status === 'completed' ? ' selected' : '') + '>Completed</option>' +
                        '</select>' +
                    '</div>' +
                '</div>' +
                '<div class="btn-actions">' +
                    '<button class="btn btn-sm btn-primary" onclick="saveEditCampaign(\'' + cid + '\')">✓ Save Changes</button>' +
                    '<button class="btn btn-sm btn-gold" onclick="cancelEdit(\'' + cid + '\')">Cancel</button>' +
                '</div>' +
            '</div>';

            // Members section
            html += '<div class="members-section">' +
                '<div class="members-section-title">⚑ Campaign Members</div>' +
                '<div class="members-grid" id="mg_' + cid + '">' +
                buildMemberChips(camp) +
                '</div>';

            // Add member control
            html += '<div class="add-member-row">' +
                '<select id="am_' + cid + '">' +
                buildAddMemberOptions(camp) +
                '</select>' +
                '<button class="btn btn-sm btn-primary" onclick="addMember(\'' + cid + '\')">+ Add</button>' +
            '</div>';

            html += '</div>'; // close members-section

            // Action buttons
            html += '<div class="btn-actions">' +
                '<button class="btn btn-sm btn-gold" onclick="toggleEdit(\'' + cid + '\')">✎ Edit Details</button>';

            if (!camp.isActive) {
                html += '<button class="btn btn-sm btn-primary" onclick="setActiveCampaign(\'' + cid + '\')">★ Set Active</button>';
            } else {
                html += '<button class="btn btn-sm btn-primary" style="opacity:0.5;cursor:default;" disabled aria-label="This campaign is already active">★ Active</button>';
            }

            html += '<button class="btn btn-sm btn-danger" onclick="deleteCampaign(\'' + cid + '\')">✕ Delete</button>' +
            '</div>';

            return html;
        }

        function buildMemberChips(camp) {
            var players = camp.players || [];
            if (players.length === 0) return '<span style="font-size:11px;color:rgba(74,222,128,0.4);font-style:italic;">No members assigned.</span>';

            var chars = loadAllCharacters();
            var html = '';
            players.forEach(function(pid) {
                var ch = chars.find(function(c) { return c.id === pid; }) || { name: pid };
                var safePid = esc(pid);
                var safeCid = esc(camp.id);
                html += '<div class="member-chip">' +
                    esc(ch.name || pid) +
                    '<button class="member-remove-btn" title="Remove member" onclick="removeMember(\'' + safeCid + '\',\'' + safePid + '\')" aria-label="Remove ' + esc(ch.name || pid) + '">✕</button>' +
                '</div>';
            });
            return html;
        }

        function buildAddMemberOptions(camp) {
            var chars = loadAllCharacters();
            var players = camp.players || [];
            var available = chars.filter(function(c) { return players.indexOf(c.id) === -1; });
            if (available.length === 0) return '<option value="">— No unassigned characters —</option>';
            var html = '<option value="">— Select character to add —</option>';
            available.forEach(function(c) {
                html += '<option value="' + esc(c.id) + '">' + esc(c.name || c.id) + '</option>';
            });
            return html;
        }

        function toggleCampaignDetails(cid) {
            var details = document.getElementById('cd_' + cid);
            var chev = document.getElementById('chev_' + cid);
            if (!details) return;
            var isOpen = details.classList.contains('open');
            details.classList.toggle('open', !isOpen);
            if (chev) chev.classList.toggle('open', !isOpen);
        }

        function toggleEdit(cid) {
            var ef = document.getElementById('ef_' + cid);
            if (!ef) return;
            ef.classList.toggle('open');
        }

        function cancelEdit(cid) {
            var ef = document.getElementById('ef_' + cid);
            if (ef) ef.classList.remove('open');
        }

        /* ── SAVE EDIT ────────────────────────────── */
        function saveEditCampaign(cid) {
            var nameEl = document.getElementById('en_' + cid);
            var overseerEl = document.getElementById('eo_' + cid);
            var descEl = document.getElementById('ed_' + cid);
            var statusEl = document.getElementById('es_' + cid);
            if (!nameEl) return;

            var newName = nameEl.value.trim();
            var newOverseer = overseerEl ? overseerEl.value.trim() : '';
            var newDesc = descEl ? descEl.value.trim() : '';
            var newStatus = statusEl ? statusEl.value : 'active';

            if (!newName) {
                showNotification('⚠ Campaign name cannot be empty.', 'warning');
                return;
            }

            var campaigns = loadCampaigns();

            // Duplicate name check (exclude self)
            if (campaigns.some(function(c) {
                return c.id !== cid && c.name.toLowerCase() === newName.toLowerCase();
            })) {
                showNotification('✕ Another campaign already has that name.', 'error');
                return;
            }

            campaigns = campaigns.map(function(c) {
                if (c.id === cid) {
                    c.name = newName;
                    c.overseerId = newOverseer;
                    c.description = newDesc;
                    c.status = newStatus;
                    c.updatedAt = today();
                }
                return c;
            });

            saveCampaigns(campaigns);
            renderCampaignList();
            showNotification('✓ Campaign updated successfully!');

            // Re-open details panel after re-render
            var details = document.getElementById('cd_' + cid);
            var chev = document.getElementById('chev_' + cid);
            if (details) { details.classList.add('open'); }
            if (chev) { chev.classList.add('open'); }
        }

        /* ── SET ACTIVE ───────────────────────────── */
        function setActiveCampaign(cid) {
            var campaigns = loadCampaigns();
            campaigns = campaigns.map(function(c) {
                c.isActive = (c.id === cid);
                return c;
            });
            saveCampaigns(campaigns);
            renderCampaignList();
            showNotification('★ Active campaign updated!');
            // Re-open the expanded panel
            var details = document.getElementById('cd_' + cid);
            var chev = document.getElementById('chev_' + cid);
            if (details) details.classList.add('open');
            if (chev) chev.classList.add('open');
        }

        /* ── DELETE CAMPAIGN ──────────────────────── */
        function deleteCampaign(cid) {
            var campaigns = loadCampaigns();
            var camp = campaigns.find(function(c) { return c.id === cid; });
            if (!camp) return;

            if (!confirm('Delete campaign "' + camp.name + '"?\n\nThis will unlink all assigned players. This cannot be undone.')) return;

            // Unlink players
            (camp.players || []).forEach(function(pid) {
                updateCharacterCampaignId(pid, null);
            });

            var wasActive = camp.isActive;
            campaigns = campaigns.filter(function(c) { return c.id !== cid; });
            if (wasActive && campaigns.length > 0) {
                campaigns[0].isActive = true;
            }
            saveCampaigns(campaigns);
            renderCampaignList();
            showNotification('✓ Campaign deleted.');
        }

        /* ── MEMBER MANAGEMENT ────────────────────── */
        function addMember(cid) {
            var sel = document.getElementById('am_' + cid);
            if (!sel || !sel.value) {
                showNotification('⚠ Select a character to add.', 'warning');
                return;
            }
            var charId = sel.value;
            var campaigns = loadCampaigns();
            campaigns = campaigns.map(function(c) {
                if (c.id === cid) {
                    if ((c.players || []).indexOf(charId) === -1) {
                        c.players = (c.players || []).concat([charId]);
                        c.updatedAt = today();
                    }
                }
                return c;
            });
            saveCampaigns(campaigns);
            updateCharacterCampaignId(charId, cid);
            renderCampaignList();
            showNotification('✓ Member added to campaign!');
            // Re-open panel
            var details = document.getElementById('cd_' + cid);
            var chev = document.getElementById('chev_' + cid);
            if (details) details.classList.add('open');
            if (chev) chev.classList.add('open');
        }

        function removeMember(cid, charId) {
            if (!confirm('Remove this member from the campaign?')) return;
            var campaigns = loadCampaigns();
            campaigns = campaigns.map(function(c) {
                if (c.id === cid) {
                    c.players = (c.players || []).filter(function(p) { return p !== charId; });
                    c.updatedAt = today();
                }
                return c;
            });
            saveCampaigns(campaigns);
            updateCharacterCampaignId(charId, null);
            renderCampaignList();
            showNotification('✓ Member removed from campaign.');
            // Re-open panel
            var details = document.getElementById('cd_' + cid);
            var chev = document.getElementById('chev_' + cid);
            if (details) details.classList.add('open');
            if (chev) chev.classList.add('open');
        }

        /* ── INIT ─────────────────────────────────── */
        window.addEventListener('DOMContentLoaded', function() {
            allCharacters = loadAllCharacters();
            renderPlayerGrid();
            renderCampaignList();
        });
    </script>
    <script src="../assets/helpers/settingsManager.js"></script>
    <script src="../assets/navigation.js"></script>
</body>
</html>
