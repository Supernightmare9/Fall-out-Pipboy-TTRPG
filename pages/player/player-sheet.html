<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fallout TTRPG Player Sheet</title>
 <style>
  body {
    background: #191f1c;
    color: #00FF41;
    font-family: 'Consolas', 'Courier New', monospace;
    max-width: 800px;
    margin: 2rem auto 1rem auto;
    padding: 1rem;
    box-shadow: 0 0 80px #00FF4180 inset;
  }
  .sheet {
    border: 3px solid #00FF41;
    border-radius: 10px;
    padding: 2rem;
    background: #222b23;
    box-shadow: 0 0 15px #00FF41 inset, 0 0 25px #4ade80a0;
  }
  h2 {
    font-family: 'Consolas', 'Courier New', monospace;
    text-transform: uppercase;
    color: #baf7a7;
    letter-spacing: 2px;
    text-shadow: 0 0 8px #4ade80;
    font-size: 1.7rem;
  }
  .row {
    display: flex;
    gap: 2rem;
  }
  .section {
    flex: 1;
    margin-bottom: 2rem;
  }
  label {
    color: #baf7a7;
    letter-spacing: 1px;
    font-size: 1rem;
    text-shadow: 0 0 8px #00FF41b0;
    text-transform: uppercase;
    font-weight: bold;
    margin-bottom: 0.5rem;
    display: inline-block;
  }
  input, textarea {
    background: #212a22;
    color: #00FF41;
    border: 2px solid #4ade80;
    border-radius: 4px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1rem;
    padding: 4px 6px;
    box-shadow: 0 0 5px #4ade8080 inset;
    margin-top: 4px;
    margin-bottom: 6px;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #fbbf24;
    box-shadow: 0 0 10px #fbbf2480;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1rem;
    background: #1d241e;
    box-shadow: 0 0 5px #00FF41b0;
  }
  th, td {
    padding: 0.4rem;
    border: 1.5px solid #4ade80;
    text-align: center;
    color: #baf7a7;
    text-shadow: 0 0 6px #4ade80;
  }
  th {
    background: #1c2220;
    color: #fbbf24;
    text-transform: uppercase;
    border-bottom: 2.5px solid #fbbf24;
  }
  .buttons {
    margin-bottom: 2rem;
  }
  button {
    background: #232a23;
    color: #4ade80;
    border: 2px solid #00FF41;
    border-radius: 5px;
    padding: 10px 23px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-weight: bold;
    font-size: 1rem;
    margin-right: 0.5rem;
    cursor: pointer;
    letter-spacing: 1px;
    text-shadow: 0 0 8px #00FF41a0;
    box-shadow: 0 0 8px #2ea650a0 inset;
    transition: all 0.2s;
  }
  button:hover {
    background: #2d3b34;
    border-color: #fbbf24;
    color: #fbbf24;
    text-shadow: 0 0 10px #fbbf24a0;
    box-shadow: 0 0 15px #fbbf2480;
  }
  progress {
    width: 90%;
    height: 18px;
    appearance: none;
    color: #00FF41;
    border: 2px solid #fbbf24;
    background-color: #212a22;
    border-radius: 6px;
    box-shadow: 0 0 7px #4ade80 inset;
  }
  progress::-webkit-progress-bar {
    background: #212a22;
    border-radius: 6px;
  }
  progress::-webkit-progress-value {
    background: #00FF41;
    box-shadow: 0 0 12px #baf7a7;
    transition: width 0.2s;
  }
  /* For Firefox */
  progress::-moz-progress-bar {
    background: #00FF41;
    box-shadow: 0 0 12px #baf7a7;
  }
  @media print {
    body { background: #fff; color: #111; }
    .sheet, h2, label, th, td, input, textarea, button, progress { 
      color: #111 !important; 
      box-shadow: none !important; 
      background: #fff !important;
      border-color: #aaa !important;
    }
    nav, .buttons { display: none !important; }
  }
</style>
</head>
<body>
  <nav style="margin-bottom: 2rem;">
    <a href="login.html">Home</a> | 
    <a href="player-sheet.html"><b>Player Sheet</b></a>
    <!-- Add overseer nav here as needed -->
  </nav>

  <div class="sheet">
    <h2>Fallout TTRPG Player Sheet</h2>
    <div class="buttons">
      <button onclick="window.print()">Print Sheet</button>
      <button onclick="clearSheet()">Download Blank</button>
    </div>
    <div class="section">
      <label>Name:</label> <input id="playerName" value="Vault Dweller" type="text" style="width: 200px">
    </div>
    <div class="row">
      <div class="section">
        <label>SPECIAL Attributes</label>
        <table>
          <tr>
            <th>S</th><th>P</th><th>E</th><th>C</th><th>I</th><th>A</th><th>L</th>
          </tr>
          <tr>
            <td><input type="number" id="S" value="5" min="1" max="10"></td>
            <td><input type="number" id="P" value="5" min="1" max="10"></td>
            <td><input type="number" id="E" value="5" min="1" max="10"></td>
            <td><input type="number" id="C" value="5" min="1" max="10"></td>
            <td><input type="number" id="I" value="5" min="1" max="10"></td>
            <td><input type="number" id="A" value="5" min="1" max="10"></td>
            <td><input type="number" id="L" value="5" min="1" max="10"></td>
          </tr>
        </table>
      </div>
      <div class="section">
        <label>AC:</label> <input id="ac" type="number" value="12" min="0" style="width: 60px">
      </div>
    </div>
    <div class="section">
      <label>Inventory</label>
      <textarea id="inventory" rows="3" style="width: 100%;">Pistol, Stimpack, Duct Tape</textarea>
    </div>
    <div class="section">
      <label>Effects</label>
      <textarea id="effects" rows="2" style="width: 100%;">+2 to Sneak (Cloak Boy), Rad-X taken</textarea>
    </div>
    <div class="row">
      <div class="section">
        <label>Radiation Tracker</label><br>
        <input id="radiation" type="number" value="0" min="0" max="100" style="width: 60px"> / 100
        <div style="margin-top: 0.5rem;">
          <progress id="radiationBar" value="0" max="100" style="width: 100%"></progress>
        </div>
      </div>
      <div class="section">
        <label>Skills</label>
        <textarea id="skills" rows="4" style="width: 100%;">Lockpick: 50, Speech: 35, Repair: 45</textarea>
      </div>
    </div>
  </div>

  <script>
    // Sync the progress bar with the input
    document.getElementById('radiation').addEventListener('input', function () {
      document.getElementById('radiationBar').value = this.value;
    });

    // Download Blank (clears all fields but doesn't actually download a file for simplicity)
    function clearSheet() {
        document.getElementById('playerName').value = '';
        ['S','P','E','C','I','A','L'].forEach(function(attr){document.getElementById(attr).value = '';});
        document.getElementById('ac').value = '';
        document.getElementById('inventory').value = '';
        document.getElementById('effects').value = '';
        document.getElementById('radiation').value = 0;
        document.getElementById('radiationBar').value = 0;
        document.getElementById('skills').value = '';
        window.print(); // Optionally immediately open print!
    }
  </script>
</body>
</html>
