<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pip-Boy Messages - Vault 215</title>
    <link rel="stylesheet" href="../../css/branding.css">
    <link rel="stylesheet" href="../../css/player/playerstyle.css">
    <style>
        :root {
            --green: #4ade80;
            --gold: #fbbf24;
            --dark: #0a0a0a;
            --darker: #111111;
            --panel: #141414;
            --border: #2a2a2a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: var(--dark); color: var(--green); font-family: 'Courier New', monospace; overflow: hidden; }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
            pointer-events: none; z-index: 9999;
        }

        #app { display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 12px 20px; border-bottom: 1px solid var(--green); background: var(--darker); flex-shrink: 0; box-shadow: 0 0 10px rgba(74,222,128,0.2); }
        #header h1 { font-size: 1.1rem; letter-spacing: 2px; color: var(--green); text-shadow: 0 0 8px var(--green); }
        #header-meta { display: flex; gap: 16px; align-items: center; margin-top: 2px; }
        #header span.subtitle { font-size: 0.7rem; color: var(--gold); }
        #conn-status { font-size: 0.65rem; color: #555; }
        #conn-status.live { color: #4ade80; }
        #conn-status.error { color: #ef4444; }
        #main { display: flex; flex: 1; overflow: hidden; }

        /* LEFT SIDEBAR */
        #sidebar { width: 290px; min-width: 290px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--darker); }
        #sidebar-top { padding: 10px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
        .sidebar-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 6px 10px; font-family: 'Courier New', monospace; font-size: 0.75rem;
            cursor: pointer; letter-spacing: 1px; transition: all 0.2s; text-align: left;
        }
        .sidebar-btn:hover { background: rgba(251,191,36,0.1); box-shadow: 0 0 6px rgba(251,191,36,0.4); }
        .sidebar-btn.green { border-color: var(--green); color: var(--green); }
        .sidebar-btn.green:hover { background: rgba(74,222,128,0.1); box-shadow: 0 0 6px rgba(74,222,128,0.4); }
        .sidebar-btn.active { background: rgba(74,222,128,0.15); box-shadow: 0 0 6px rgba(74,222,128,0.4); border-color: var(--green); color: var(--green); }
        #search-input { background: var(--dark); border: 1px solid var(--border); color: var(--green); padding: 5px 8px; font-family: 'Courier New', monospace; font-size: 0.75rem; outline: none; }
        #search-input:focus { border-color: var(--green); }
        #search-input::placeholder { color: #555; }

        /* Conv list */
        #conv-list { flex: 1; overflow-y: auto; }
        #conv-list::-webkit-scrollbar { width: 4px; }
        #conv-list::-webkit-scrollbar-track { background: var(--dark); }
        #conv-list::-webkit-scrollbar-thumb { background: #333; }
        .conv-section-label { padding: 6px 10px; font-size: 0.65rem; color: #555; letter-spacing: 2px; border-bottom: 1px solid #1a1a1a; }
        .conv-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #1a1a1a; display: flex; flex-direction: column; gap: 3px; transition: background 0.15s; }
        .conv-item:hover { background: rgba(74,222,128,0.04); }
        .conv-item.active { background: rgba(74,222,128,0.08); border-left: 2px solid var(--green); }
        .conv-item-top { display: flex; justify-content: space-between; align-items: center; }
        .conv-name { font-size: 0.8rem; font-weight: bold; color: var(--green); }
        .conv-name.unread { color: #fff; }
        .conv-name.system { color: #60a5fa; }
        .conv-time { font-size: 0.65rem; color: #555; }
        .conv-preview-row { display: flex; justify-content: space-between; align-items: center; }
        .conv-preview { font-size: 0.7rem; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }
        .conv-preview.unread { color: #999; }
        .unread-badge { background: var(--gold); color: #000; font-size: 0.6rem; padding: 1px 5px; border-radius: 10px; font-weight: bold; min-width: 18px; text-align: center; }
        .archived-label { font-size: 0.65rem; color: #555; font-style: italic; }

        /* RIGHT DETAIL */
        #detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #detail-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #333; font-size: 0.9rem; letter-spacing: 2px; }
        #detail-content { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        #detail-header { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--darker); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #detail-header-left h2 { font-size: 0.9rem; color: var(--green); }
        #detail-header-left p { font-size: 0.7rem; color: var(--gold); }
        #detail-header-actions { display: flex; gap: 8px; }
        .hdr-btn { background: transparent; border: 1px solid var(--border); color: #888; padding: 4px 10px; font-family: 'Courier New', monospace; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
        .hdr-btn:hover { border-color: var(--green); color: var(--green); }
        .hdr-btn.archive:hover { border-color: var(--gold); color: var(--gold); }

        /* Message thread */
        #messages-thread { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        #messages-thread::-webkit-scrollbar { width: 4px; }
        #messages-thread::-webkit-scrollbar-track { background: var(--dark); }
        #messages-thread::-webkit-scrollbar-thumb { background: #333; }
        .msg-bubble { max-width: 80%; padding: 8px 12px; font-size: 0.78rem; line-height: 1.5; }
        .msg-bubble.from-me { align-self: flex-end; background: rgba(74,222,128,0.1); border-left: 3px solid var(--green); }
        .msg-bubble.from-other { align-self: flex-start; background: rgba(251,191,36,0.05); border-left: 3px solid var(--gold); }
        .msg-bubble.from-system { align-self: flex-start; background: rgba(96,165,250,0.07); border-left: 3px solid #60a5fa; max-width: 90%; }
        .msg-meta { font-size: 0.65rem; color: #555; margin-bottom: 3px; }
        .msg-meta.from-me { color: rgba(74,222,128,0.6); }
        .msg-meta.from-other { color: rgba(251,191,36,0.5); }
        .msg-meta.from-system { color: rgba(96,165,250,0.5); }
        .msg-text { color: #ccc; }
        .msg-bubble.from-me .msg-text { color: rgba(74,222,128,0.9); }
        .msg-bubble.from-system .msg-text { color: rgba(96,165,250,0.9); }

        /* Compose */
        #compose-area { border-top: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; background: var(--darker); flex-shrink: 0; }
        #compose-area.hidden { display: none; }
        #msg-input { flex: 1; background: var(--dark); border: 1px solid var(--border); color: var(--green); padding: 8px 10px; font-family: 'Courier New', monospace; font-size: 0.8rem; resize: none; outline: none; min-height: 60px; }
        #msg-input:focus { border-color: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.2); }
        #msg-input::placeholder { color: #444; }
        #send-btn { background: rgba(74,222,128,0.1); border: 1px solid var(--green); color: var(--green); padding: 0 16px; font-family: 'Courier New', monospace; font-size: 0.8rem; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; }
        #send-btn:hover { background: rgba(74,222,128,0.2); box-shadow: 0 0 8px rgba(74,222,128,0.4); }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Nav */
        #nav-bar { border-top: 1px solid var(--border); background: var(--darker); padding: 6px 0; flex-shrink: 0; }

        /* Notes panel */
        #notes-btn { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 6px 10px; font-family: 'Courier New', monospace; font-size: 0.75rem; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; }
        #notes-btn:hover { background: rgba(74,222,128,0.1); }
        #notes-panel { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        #notes-header { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--darker); flex-shrink: 0; }
        #notes-header h2 { font-size: 0.9rem; color: var(--green); }
        #notes-header p { font-size: 0.7rem; color: #555; margin-top: 2px; }
        #notes-textarea { flex: 1; background: var(--dark); border: none; border-top: 1px solid var(--border); color: var(--green); padding: 16px; font-family: 'Courier New', monospace; font-size: 0.8rem; resize: none; outline: none; line-height: 1.6; }
        #notes-textarea::placeholder { color: #444; }

        /* Compose dialog modal */
        #compose-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 2000; align-items: center; justify-content: center; }
        #compose-modal.visible { display: flex; }
        #compose-modal-box { background: var(--darker); border: 1px solid var(--green); padding: 24px; width: 340px; max-width: 90vw; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 0 30px rgba(74,222,128,0.2); }
        #compose-modal-box h3 { font-size: 0.9rem; color: var(--green); letter-spacing: 2px; }
        #compose-modal-box p { font-size: 0.7rem; color: #666; }
        #recipient-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
        .recipient-item { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
        .recipient-item:hover { background: rgba(74,222,128,0.05); }
        .recipient-item input[type="checkbox"] { accent-color: var(--green); width: 14px; height: 14px; cursor: pointer; }
        .recipient-item label { font-size: 0.78rem; color: var(--green); cursor: pointer; flex: 1; }
        .recipient-item label.overseer { color: var(--gold); }
        #compose-modal-actions { display: flex; gap: 8px; }
        .modal-btn { flex: 1; background: transparent; border: 1px solid var(--green); color: var(--green); padding: 8px; font-family: 'Courier New', monospace; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
        .modal-btn:hover { background: rgba(74,222,128,0.1); }
        .modal-btn.cancel { border-color: #555; color: #888; }
        .modal-btn.cancel:hover { border-color: var(--gold); color: var(--gold); }
        #no-roster-msg { font-size: 0.75rem; color: #555; text-align: center; padding: 12px 0; }
    </style>
</head>
<body>
<div id="app">
    <div id="header">
        <h1>📻 MESSAGES — VAULT 215 COMMUNICATION SYSTEM</h1>
        <div id="header-meta">
            <span class="subtitle">ENCRYPTED CHANNEL // AUTHORIZED PERSONNEL ONLY</span>
            <span id="conn-status">⬤ OFFLINE</span>
        </div>
    </div>

    <div id="main">
        <div id="sidebar">
            <div id="sidebar-top">
                <button class="sidebar-btn" onclick="openComposeModal()">+ NEW CONVERSATION</button>
                <button id="notes-btn" class="sidebar-btn green" onclick="openNotes()">📝 MY NOTES</button>
                <input id="search-input" type="text" placeholder="[Search conversations...]" oninput="renderConvList()" />
            </div>
            <div id="conv-list"></div>
        </div>

        <div id="detail">
            <div id="detail-empty">[ SELECT A CONVERSATION ]</div>
            <div id="detail-content">
                <div id="detail-header">
                    <div id="detail-header-left">
                        <h2 id="dh-name"></h2>
                        <p id="dh-role"></p>
                    </div>
                    <div id="detail-header-actions">
                        <button class="hdr-btn" onclick="markRead()">✓ MARK READ</button>
                        <button class="hdr-btn archive" onclick="archiveCurrent()">⬇ ARCHIVE</button>
                    </div>
                </div>
                <div id="messages-thread"></div>
                <div id="compose-area">
                    <textarea id="msg-input" placeholder="Type your message..." onkeydown="handleKey(event)"></textarea>
                    <button id="send-btn" onclick="sendMessage()">SEND</button>
                </div>
            </div>
            <div id="notes-panel">
                <div id="notes-header">
                    <h2>📝 MY NOTES</h2>
                    <p>PRIVATE — visible only to you, saved locally</p>
                </div>
                <textarea id="notes-textarea" placeholder="Write your private notes here... (auto-saved)" oninput="saveNotes(this.value)"></textarea>
            </div>
        </div>
    </div>

    <div id="nav-bar"></div>
</div>

<!-- New conversation modal -->
<div id="compose-modal" role="dialog" aria-modal="true" aria-label="New conversation">
    <div id="compose-modal-box">
        <h3>NEW CONVERSATION</h3>
        <p>Select one or more recipients:</p>
        <div id="recipient-list"></div>
        <div id="no-roster-msg" style="display:none">No other players online yet. Try refreshing after others join.</div>
        <div id="compose-modal-actions">
            <button class="modal-btn" onclick="confirmCompose()">CREATE</button>
            <button class="modal-btn cancel" onclick="closeComposeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script src="../../assets/helpers/Managers/settingsManager.js"></script>
<script src="../../assets/helpers/navigation/playernavigation.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// VAULT 215 — PLAYER MESSAGES
// Real-time messaging with Socket.IO; localStorage-based persistence.
// Storage key: vault_msgs_v1_<playerHandle>  (private to each player)
// Conversation ID: sorted participant handles joined by '::'
// ═══════════════════════════════════════════════════════════════════════════════

// ── Credentials ──────────────────────────────────────────────────────────────
var _myHandle    = localStorage.getItem('PIPBOY_PLAYER_HANDLE') || '';
var _sessionCode = localStorage.getItem('PIPBOY_SESSION_CODE')  || '';
var _serverUrl   = localStorage.getItem('PIPBOY_SERVER_URL')    || '';

// ── Utils ─────────────────────────────────────────────────────────────────────
function escapeHtml(t) {
    if (!t) return '';
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relativeTime(ts) {
    var diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60)     return 'just now';
    if (diff < 3600)   return Math.floor(diff/60)    + 'm ago';
    if (diff < 86400)  return Math.floor(diff/3600)  + 'h ago';
    if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
    return new Date(ts).toLocaleDateString();
}

function genId() { return '_' + Math.random().toString(36).substr(2,9); }

// Build a stable conversation ID from an array of participant handles
function mkConvId(participants) {
    return participants.map(function(h){ return h.toLowerCase().trim(); }).sort().join('::');
}

// Human-readable display name for a conversation (participants minus myself)
function convDisplayName(participants) {
    var others = participants.filter(function(p){ return p !== _myHandle; });
    if (others.length === 0) return '(you)';
    return others.map(function(p){ return p === 'overseer' ? '⬡ Overseer' : p; }).join(', ');
}

// ── Storage ───────────────────────────────────────────────────────────────────
var STORAGE_KEY = 'vault_msgs_v1_' + _myHandle;

function loadData() {
    try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
    } catch(e) {}
    return { conversations: {} };
}

function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
}

function totalUnread() {
    return Object.values(appData.conversations).reduce(function(s, c){ return s + (c.unreadCount || 0); }, 0);
}

function updateNavBadge() {
    var badge = document.getElementById('nav-messages-badge');
    if (!badge) return;
    var n = totalUnread();
    badge.textContent = n > 99 ? '99+' : String(n);
    badge.style.display = n > 0 ? 'inline-block' : 'none';
}

// ── App state ─────────────────────────────────────────────────────────────────
var appData      = loadData();
var activeConvId = null;
var _roster      = [];  // available handles to message (updated from server)
var _socket      = null;
var _connected   = false;

// ── Socket connection ─────────────────────────────────────────────────────────
function initSocket() {
    if (!_myHandle || !_sessionCode) {
        setStatus('error', '⬤ ERROR: No credentials. Re-login required.');
        return;
    }

    try {
        _socket = io(_serverUrl || '', { transports: ['websocket', 'polling'] });
    } catch(e) {
        setStatus('error', '⬤ OFFLINE: Socket.IO not available');
        return;
    }

    _socket.on('connect', function() {
        setStatus('connecting', '⬤ CONNECTING…');
        _socket.emit('player:join', {
            sessionCode:  _sessionCode,
            playerHandle: _myHandle
        });
    });

    _socket.on('session:joined', function() {
        _connected = true;
        setStatus('live', '⬤ LIVE — ' + _myHandle + ' @ ' + _sessionCode);
        _socket.emit('msg:get-roster');
    });

    _socket.on('campaign:waiting', function() {
        setStatus('connecting', '⬤ WAITING FOR OVERSEER…');
    });

    _socket.on('msg:roster', function(payload) {
        var players = Array.isArray(payload.players) ? payload.players : [];
        _roster = players.filter(function(p){ return p !== _myHandle; });
        if (payload.overseerOnline) _roster.push('overseer');
    });

    // Real-time incoming message from another participant
    _socket.on('msg:incoming', function(payload) {
        if (!payload || !payload.convId) return;
        handleIncomingMsg(payload);
    });

    // System messages: XP awards, mutations, events (private to this player)
    _socket.on('player:private-message', function(payload) {
        if (!payload) return;
        handleSystemMsg(payload);
    });

    _socket.on('disconnect', function() {
        _connected = false;
        setStatus('error', '⬤ DISCONNECTED — reconnecting…');
    });
}

function setStatus(cls, text) {
    var el = document.getElementById('conn-status');
    if (!el) return;
    el.className = cls;
    el.textContent = text;
}

// ── Incoming message handler ──────────────────────────────────────────────────
function handleIncomingMsg(payload) {
    // payload: { convId, participants, from, text, timestamp }
    var convId = payload.convId;
    var conv = appData.conversations[convId];

    if (!conv) {
        // New conversation — create it
        conv = {
            participants:  payload.participants,
            displayName:   convDisplayName(payload.participants),
            messages:      [],
            unreadCount:   0,
            lastActivity:  payload.timestamp || Date.now(),
            archived:      false,
            isSystem:      false
        };
        appData.conversations[convId] = conv;
    }

    var msg = {
        id:        genId(),
        from:      payload.from,
        text:      payload.text,
        timestamp: payload.timestamp || Date.now()
    };
    conv.messages.push(msg);
    conv.lastActivity = msg.timestamp;

    // Only count unread if this conversation isn't currently open
    if (convId !== activeConvId) {
        conv.unreadCount = (conv.unreadCount || 0) + 1;
    }

    saveData();
    renderConvList();
    updateNavBadge();

    if (convId === activeConvId) {
        renderMessages(conv);
    }
}

// ── System message handler ────────────────────────────────────────────────────
function handleSystemMsg(payload) {
    var SYSTEM_CONV_ID = 'system::' + _myHandle.toLowerCase();
    var conv = appData.conversations[SYSTEM_CONV_ID];

    if (!conv) {
        conv = {
            participants:  ['system', _myHandle],
            displayName:   '📡 SYSTEM',
            messages:      [],
            unreadCount:   0,
            lastActivity:  Date.now(),
            archived:      false,
            isSystem:      true
        };
        appData.conversations[SYSTEM_CONV_ID] = conv;
    }

    var text = payload.message || JSON.stringify(payload);
    var msg  = { id: genId(), from: 'system', text: text, timestamp: Date.now() };
    conv.messages.push(msg);
    conv.lastActivity = msg.timestamp;

    if (SYSTEM_CONV_ID !== activeConvId) {
        conv.unreadCount = (conv.unreadCount || 0) + 1;
    }

    saveData();
    renderConvList();
    updateNavBadge();

    if (SYSTEM_CONV_ID === activeConvId) {
        renderMessages(conv);
    }
}

// ── Render conversation list ──────────────────────────────────────────────────
function renderConvList() {
    var search = (document.getElementById('search-input').value || '').toLowerCase();
    var list = document.getElementById('conv-list');
    list.innerHTML = '';

    var convs = Object.entries(appData.conversations).map(function(e){ return { id: e[0], conv: e[1] }; });

    function matchesSearch(entry) {
        if (!search) return true;
        if ((entry.conv.displayName || '').toLowerCase().includes(search)) return true;
        return (entry.conv.messages || []).some(function(m){ return m.text.toLowerCase().includes(search); });
    }

    var active   = convs.filter(function(e){ return !e.conv.archived; }).filter(matchesSearch);
    var archived = convs.filter(function(e){ return e.conv.archived;  }).filter(matchesSearch);

    active.sort(function(a, b){ return (b.conv.lastActivity||0) - (a.conv.lastActivity||0); });
    archived.sort(function(a, b){ return (b.conv.lastActivity||0) - (a.conv.lastActivity||0); });

    if (active.length === 0 && archived.length === 0) {
        list.innerHTML = '<div style="padding:16px;color:#444;font-size:0.75rem;text-align:center;">No conversations. Click [+ NEW CONVERSATION] to start one.</div>';
        return;
    }

    active.forEach(function(e){ list.appendChild(buildConvItem(e.id, e.conv, false)); });

    if (archived.length > 0) {
        var lbl = document.createElement('div');
        lbl.className = 'conv-section-label';
        lbl.textContent = '── ARCHIVED ──';
        list.appendChild(lbl);
        archived.forEach(function(e){ list.appendChild(buildConvItem(e.id, e.conv, true)); });
    }
}

function buildConvItem(convId, conv, isArchived) {
    var el = document.createElement('div');
    el.className = 'conv-item' + (convId === activeConvId ? ' active' : '');
    el.onclick = function(){ openConv(convId); };

    var lastMsg = conv.messages.length ? conv.messages[conv.messages.length - 1] : null;
    var preview = lastMsg ? lastMsg.text.substring(0,50) + (lastMsg.text.length > 50 ? '...' : '') : '(no messages yet)';
    var hasUnread = (conv.unreadCount || 0) > 0;
    var nameClass = 'conv-name' + (hasUnread ? ' unread' : '') + (conv.isSystem ? ' system' : '');

    el.innerHTML =
        '<div class="conv-item-top">' +
            '<span class="' + nameClass + '">' + escapeHtml(conv.displayName || convId) + '</span>' +
            '<span class="conv-time">' + relativeTime(conv.lastActivity || Date.now()) + '</span>' +
        '</div>' +
        '<div class="conv-preview-row">' +
            '<span class="conv-preview' + (hasUnread ? ' unread' : '') + '">' + escapeHtml(preview) + '</span>' +
            (hasUnread
                ? '<span class="unread-badge">' + conv.unreadCount + '</span>'
                : (isArchived ? '<span class="archived-label">archived</span>' : '')) +
        '</div>';
    return el;
}

// ── Open conversation ─────────────────────────────────────────────────────────
function openConv(convId) {
    activeConvId = convId;
    var conv = appData.conversations[convId];
    if (!conv) return;

    document.getElementById('notes-panel').style.display = 'none';
    document.getElementById('notes-btn').classList.remove('active');
    document.getElementById('detail-empty').style.display = 'none';
    var dc = document.getElementById('detail-content');
    dc.style.display = 'flex';

    document.getElementById('dh-name').textContent = conv.displayName || convId;
    document.getElementById('dh-role').textContent = conv.isSystem
        ? 'System notifications (read-only)'
        : 'Participants: ' + (conv.participants || []).join(', ');

    // Hide compose area for system conversations (read-only)
    var ca = document.getElementById('compose-area');
    ca.className = conv.isSystem ? 'hidden' : '';

    renderMessages(conv);
    markRead();
    renderConvList();
}

function renderMessages(conv) {
    var thread = document.getElementById('messages-thread');
    thread.innerHTML = '';

    if (!conv.messages || conv.messages.length === 0) {
        thread.innerHTML = '<div style="color:#444;font-size:0.75rem;text-align:center;margin-top:40px;">No messages yet. Send one!</div>';
        return;
    }

    conv.messages.forEach(function(msg) {
        var isMe     = msg.from === _myHandle;
        var isSystem = msg.from === 'system';
        var cls = isMe ? 'from-me' : (isSystem ? 'from-system' : 'from-other');
        var metaCls = cls;
        var senderLabel = isMe ? 'You' : (isSystem ? '📡 SYSTEM' : escapeHtml(msg.from));

        var bubble = document.createElement('div');
        bubble.className = 'msg-bubble ' + cls;
        bubble.innerHTML =
            '<div class="msg-meta ' + metaCls + '">' + senderLabel + ' · ' + relativeTime(msg.timestamp) + '</div>' +
            '<div class="msg-text">' + escapeHtml(msg.text) + '</div>';
        thread.appendChild(bubble);
    });

    requestAnimationFrame(function(){ thread.scrollTop = thread.scrollHeight; });
}

// ── Send message ──────────────────────────────────────────────────────────────
function sendMessage() {
    if (!activeConvId) return;
    var conv = appData.conversations[activeConvId];
    if (!conv || conv.isSystem) return;

    var input = document.getElementById('msg-input');
    var text  = (input.value || '').trim();
    if (!text) return;

    if (!_connected || !_socket) {
        alert('Not connected to server. Please wait or refresh.');
        return;
    }

    // Recipients = all participants except myself
    var to = (conv.participants || []).filter(function(p){ return p !== _myHandle; });
    if (to.length === 0) return;

    _socket.emit('msg:send', { to: to, text: text });

    // Optimistic local store (the server will also echo back via msg:incoming,
    // but we add it locally now so the UI feels instant)
    var msg = { id: genId(), from: _myHandle, text: text, timestamp: Date.now() };
    conv.messages.push(msg);
    conv.lastActivity = msg.timestamp;
    input.value = '';
    saveData();
    renderMessages(conv);
    renderConvList();
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ── Mark read ─────────────────────────────────────────────────────────────────
function markRead() {
    if (!activeConvId) return;
    var conv = appData.conversations[activeConvId];
    if (!conv) return;
    conv.unreadCount = 0;
    saveData();
    renderConvList();
    updateNavBadge();
}

// ── Archive ───────────────────────────────────────────────────────────────────
function archiveCurrent() {
    if (!activeConvId) return;
    var conv = appData.conversations[activeConvId];
    if (!conv) return;
    conv.archived = !conv.archived;
    saveData();
    renderConvList();
}

// ── New conversation modal ────────────────────────────────────────────────────
function openComposeModal() {
    var modal = document.getElementById('compose-modal');
    var rList = document.getElementById('recipient-list');
    var noMsg = document.getElementById('no-roster-msg');

    rList.innerHTML = '';

    // Request fresh roster from server
    if (_socket && _connected) {
        _socket.emit('msg:get-roster');
    }

    // Also include contacts from existing conversations
    var knownHandles = new Set();
    Object.values(appData.conversations).forEach(function(c) {
        (c.participants || []).forEach(function(p) {
            if (p !== _myHandle && p !== 'system') knownHandles.add(p);
        });
    });
    _roster.forEach(function(h) { knownHandles.add(h); });

    var handles = Array.from(knownHandles);

    if (handles.length === 0) {
        noMsg.style.display = 'block';
        rList.style.display = 'none';
    } else {
        noMsg.style.display = 'none';
        rList.style.display = 'flex';

        handles.sort().forEach(function(h) {
            var item = document.createElement('div');
            item.className = 'recipient-item';
            var cbId = 'rcpt_' + h;
            var displayH = h === 'overseer' ? '⬡ Overseer' : h;
            item.innerHTML =
                '<input type="checkbox" id="' + cbId + '" value="' + escapeHtml(h) + '">' +
                '<label for="' + cbId + '" class="' + (h === 'overseer' ? 'overseer' : '') + '">' + escapeHtml(displayH) + '</label>';
            item.querySelector('label').addEventListener('click', function(e) {
                e.preventDefault();
                var cb = document.getElementById(cbId);
                cb.checked = !cb.checked;
            });
            rList.appendChild(item);
        });
    }

    modal.classList.add('visible');
}

function closeComposeModal() {
    document.getElementById('compose-modal').classList.remove('visible');
}

function confirmCompose() {
    var checked = Array.from(document.querySelectorAll('#recipient-list input[type="checkbox"]:checked'))
        .map(function(cb){ return cb.value; });

    if (checked.length === 0) {
        alert('Select at least one recipient.');
        return;
    }

    var participants = [_myHandle].concat(checked);
    var convId = mkConvId(participants);

    if (!appData.conversations[convId]) {
        appData.conversations[convId] = {
            participants:  participants.slice().sort(),
            displayName:   convDisplayName(participants.slice().sort()),
            messages:      [],
            unreadCount:   0,
            lastActivity:  Date.now(),
            archived:      false,
            isSystem:      false
        };
        saveData();
        renderConvList();
    }

    closeComposeModal();
    openConv(convId);
}

// Close modal on backdrop click
document.getElementById('compose-modal').addEventListener('click', function(e) {
    if (e.target === this) closeComposeModal();
});

// ── Notes ─────────────────────────────────────────────────────────────────────
var NOTES_KEY = 'vault_player_notes';
var _notesSaveTimer = null;

function loadNotes() {
    try { return localStorage.getItem(NOTES_KEY) || ''; } catch(e) { return ''; }
}

function saveNotes(text) {
    clearTimeout(_notesSaveTimer);
    _notesSaveTimer = setTimeout(function(){ try { localStorage.setItem(NOTES_KEY, text); } catch(e) {} }, 400);
}

function openNotes() {
    activeConvId = null;
    document.getElementById('detail-empty').style.display = 'none';
    document.getElementById('detail-content').style.display = 'none';
    document.getElementById('notes-panel').style.display = 'flex';
    document.getElementById('notes-textarea').value = loadNotes();
    document.getElementById('notes-btn').classList.add('active');
    renderConvList();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderConvList();
updateNavBadge();
initSocket();
</script>
</body>
</html>
