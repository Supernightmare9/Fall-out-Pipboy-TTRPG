<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault 215 — Crafting Recipe Manager</title>
    <link rel="stylesheet" href="../../css/branding.css">
    <link rel="stylesheet" href="../../css/overseer/overseerstyle.css">
    <style>
        :root {
            --overseer-blue:        #0a1628;
            --overseer-blue-mid:    #0d2045;
            --overseer-blue-bright: #1a3a6e;
            --overseer-gold:        #d4a017;
            --overseer-gold-bright: #f0c040;
            --overseer-gold-dim:    #8b6914;
            --overseer-white:       #e8e8e8;
            --overseer-red:         #cc2200;
            --overseer-red-bright:  #ff3300;
            --overseer-green:       #00cc66;
            --overseer-green-bright:#00ff80;
            --overseer-dark:        #04080f;
            --overseer-border:      #2a5298;
            --overseer-glow-gold:   rgba(212,160,23,0.6);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            width:100%;min-height:100vh;
            background-color:var(--overseer-dark);
            color:var(--overseer-white);
            font-family:'Courier New',monospace;
            background-image:
                radial-gradient(circle at 15% 30%,rgba(42,82,152,.12) 0%,transparent 55%),
                radial-gradient(circle at 85% 70%,rgba(212,160,23,.08) 0%,transparent 55%);
        }
        body::before{
            content:'';position:fixed;top:0;left:0;width:100%;height:100%;
            background:repeating-linear-gradient(0deg,rgba(0,0,0,.18),rgba(0,0,0,.18) 1px,transparent 1px,transparent 3px);
            pointer-events:none;z-index:9999;
        }
        .hidden{display:none!important;}

        /* ── COMMAND BAR ─────────────────────────────────────────────── */
        .command-bar{
            background:var(--overseer-blue-mid);
            border-bottom:2px solid var(--overseer-gold);
            box-shadow:0 2px 20px var(--overseer-glow-gold);
            padding:14px 24px 14px 80px;
            display:flex;align-items:center;justify-content:space-between;
            flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;
        }
        .command-bar-left{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
        .overseer-title-bar{font-size:18px;font-weight:bold;color:var(--overseer-gold-bright);letter-spacing:3px;text-shadow:0 0 10px var(--overseer-glow-gold);}
        .overseer-badge{font-size:9px;color:var(--overseer-gold-bright);letter-spacing:2px;text-transform:uppercase;}
        .cmd-btn{
            background:transparent;border:1px solid var(--overseer-gold);color:var(--overseer-gold);
            font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;
            padding:7px 14px;cursor:pointer;transition:all .2s;text-transform:uppercase;
        }
        .cmd-btn:hover{background:rgba(212,160,23,.15);box-shadow:0 0 10px rgba(212,160,23,.3);}
        .cmd-btn.success{border-color:var(--overseer-green);color:var(--overseer-green-bright);}
        .cmd-btn.success:hover{background:rgba(0,204,102,.15);}
        .cmd-btn.danger{border-color:var(--overseer-red-bright);color:var(--overseer-red-bright);}
        .cmd-btn.danger:hover{background:rgba(255,51,0,.15);}

        /* ── LAYOUT ──────────────────────────────────────────────────── */
        .page-content{padding:20px 24px;max-width:1600px;margin:0 auto;}
        .two-col{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start;}
        @media(max-width:1100px){.two-col{grid-template-columns:1fr;}}

        /* ── PANEL ───────────────────────────────────────────────────── */
        .panel{background:var(--overseer-blue-mid);border:1px solid var(--overseer-border);box-shadow:0 0 20px rgba(42,82,152,.2);margin-bottom:16px;}
        .panel-header{
            background:var(--overseer-blue-bright);border-bottom:2px solid var(--overseer-gold);
            padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;
        }
        .panel-title{font-size:12px;font-weight:bold;color:var(--overseer-gold-bright);letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 8px var(--overseer-glow-gold);}
        .panel-body{padding:14px;}

        /* ── SEARCH / FILTER BAR ────────────────────────────────────── */
        .filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
        .filter-input{
            flex:1;min-width:120px;
            background:var(--overseer-dark);border:1px solid var(--overseer-border);
            color:var(--overseer-white);font-family:'Courier New',monospace;font-size:11px;
            padding:6px 10px;outline:none;
        }
        .filter-input:focus{border-color:var(--overseer-gold);}
        .filter-input::placeholder{color:rgba(232,232,232,.35);}
        .filter-select{
            background:var(--overseer-dark);border:1px solid var(--overseer-border);
            color:var(--overseer-gold);font-family:'Courier New',monospace;font-size:11px;
            padding:6px 8px;cursor:pointer;outline:none;
        }
        .filter-select:focus{border-color:var(--overseer-gold);}

        /* ── RECIPE LIST ─────────────────────────────────────────────── */
        .recipe-list{max-height:520px;overflow-y:auto;}
        .recipe-list::-webkit-scrollbar{width:5px;}
        .recipe-list::-webkit-scrollbar-track{background:var(--overseer-dark);}
        .recipe-list::-webkit-scrollbar-thumb{background:var(--overseer-blue-bright);border-radius:3px;}

        .recipe-item{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 12px;border-bottom:1px solid rgba(42,82,152,.4);
            cursor:pointer;gap:10px;transition:background .15s;
        }
        .recipe-item:last-child{border-bottom:none;}
        .recipe-item:hover{background:rgba(212,160,23,.06);}
        .recipe-item.active{background:rgba(212,160,23,.12);border-left:3px solid var(--overseer-gold);}
        .recipe-item-info{flex:1;min-width:0;}
        .recipe-name{font-size:12px;font-weight:bold;color:var(--overseer-white);letter-spacing:1px;text-transform:uppercase;}
        .recipe-meta{font-size:9px;color:rgba(232,232,232,.5);margin-top:2px;}
        .recipe-badge{
            font-size:9px;padding:2px 7px;border-radius:2px;
            text-transform:uppercase;letter-spacing:1px;white-space:nowrap;flex-shrink:0;
        }
        .badge-common{background:rgba(232,232,232,.12);color:var(--overseer-white);}
        .badge-uncommon{background:rgba(96,165,250,.2);color:#60a5fa;}
        .badge-rare{background:rgba(212,160,23,.2);color:var(--overseer-gold-bright);}
        .badge-legendary{background:rgba(204,34,0,.25);color:var(--overseer-red-bright);}

        /* ── RECIPE DETAIL / EDITOR ─────────────────────────────────── */
        .detail-section{margin-bottom:16px;}
        .detail-label{font-size:10px;color:var(--overseer-gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
        .detail-value{font-size:12px;color:var(--overseer-white);}

        .ingredient-list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
        .ingredient-row{
            display:flex;align-items:center;gap:8px;
            background:var(--overseer-blue);border:1px solid var(--overseer-border);
            padding:7px 10px;
        }
        .ingredient-qty{
            width:50px;background:var(--overseer-dark);border:1px solid var(--overseer-border);
            color:var(--overseer-gold);font-family:'Courier New',monospace;font-size:11px;
            padding:4px 6px;text-align:center;outline:none;
        }
        .ingredient-qty:focus{border-color:var(--overseer-gold);}
        .ingredient-name{flex:1;font-size:11px;color:var(--overseer-white);}
        .ingredient-remove{
            background:transparent;border:none;color:var(--overseer-red-bright);
            font-family:'Courier New',monospace;font-size:14px;cursor:pointer;
            padding:2px 6px;transition:all .2s;
        }
        .ingredient-remove:hover{text-shadow:0 0 8px var(--overseer-red-bright);}

        .form-group{margin-bottom:12px;}
        .form-label{font-size:10px;color:var(--overseer-gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;display:block;}
        .form-input{
            width:100%;background:var(--overseer-dark);border:1px solid var(--overseer-border);
            color:var(--overseer-white);font-family:'Courier New',monospace;font-size:11px;
            padding:7px 10px;outline:none;
        }
        .form-input:focus{border-color:var(--overseer-gold);}
        .form-input::placeholder{color:rgba(232,232,232,.3);}
        .form-select{
            width:100%;background:var(--overseer-dark);border:1px solid var(--overseer-border);
            color:var(--overseer-gold);font-family:'Courier New',monospace;font-size:11px;
            padding:7px 10px;cursor:pointer;outline:none;
        }
        .form-select:focus{border-color:var(--overseer-gold);}
        .form-textarea{
            width:100%;background:var(--overseer-dark);border:1px solid var(--overseer-border);
            color:var(--overseer-white);font-family:'Courier New',monospace;font-size:11px;
            padding:7px 10px;resize:vertical;min-height:60px;outline:none;line-height:1.5;
        }
        .form-textarea:focus{border-color:var(--overseer-gold);}
        .form-textarea::placeholder{color:rgba(232,232,232,.3);}

        .success-pct-bar{
            width:100%;height:8px;background:rgba(255,255,255,.08);border-radius:4px;
            overflow:hidden;margin-top:6px;border:1px solid var(--overseer-border);
        }
        .success-pct-fill{height:100%;border-radius:4px;background:var(--overseer-green);box-shadow:0 0 6px var(--overseer-green);transition:width .4s ease;}

        .form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap;}

        /* ── STATUS TOAST ────────────────────────────────────────────── */
        #statusToast{
            position:fixed;bottom:30px;right:30px;
            background:var(--overseer-blue-mid);border:2px solid var(--overseer-green);
            color:var(--overseer-green-bright);font-family:'Courier New',monospace;
            font-size:12px;padding:12px 20px;z-index:9000;
            box-shadow:0 0 20px rgba(0,204,102,.4);opacity:0;
            transition:opacity .3s;pointer-events:none;
        }
        #statusToast.visible{opacity:1;}
        #statusToast.error{border-color:var(--overseer-red-bright);color:var(--overseer-red-bright);box-shadow:0 0 20px rgba(255,51,0,.4);}

        ::-webkit-scrollbar{width:6px;}
        ::-webkit-scrollbar-track{background:var(--overseer-dark);}
        ::-webkit-scrollbar-thumb{background:var(--overseer-blue-bright);border-radius:3px;}

        @media(max-width:768px){.command-bar{padding-left:70px;}}
        /* ── PENDING REQUEST PANEL ───────────────────────────── */
        .pending-panel{background:rgba(204,34,0,.08);border:1px solid var(--overseer-red-bright);margin-bottom:16px;}
        .pending-panel .panel-header{background:rgba(204,34,0,.2);border-bottom:2px solid var(--overseer-red-bright);}
        .pending-panel .panel-title{color:var(--overseer-red-bright);}
        .req-badge{
            background:var(--overseer-red-bright);color:#fff;font-size:10px;font-weight:bold;
            padding:2px 8px;border-radius:10px;min-width:20px;text-align:center;display:inline-block;
        }
        .req-list{display:flex;flex-direction:column;gap:6px;}
        .req-row{
            display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
            background:rgba(255,51,0,.05);border:1px solid rgba(255,51,0,.25);
            cursor:pointer;transition:background .15s;
        }
        .req-row:hover{background:rgba(255,51,0,.12);}
        .req-row.active{background:rgba(255,51,0,.18);border-color:var(--overseer-red-bright);}
        .req-row-info{flex:1;min-width:0;}
        .req-row-name{font-size:12px;font-weight:bold;color:var(--overseer-white);letter-spacing:1px;text-transform:uppercase;}
        .req-row-meta{font-size:10px;color:rgba(232,232,232,.5);margin-top:2px;}
        .req-row-from{font-size:10px;color:var(--overseer-gold);margin-top:2px;}

        /* ── APPROVAL EDITOR ─────────────────────────────────── */
        .approval-panel{background:rgba(212,160,23,.06);border:1px solid var(--overseer-gold);}
        .approval-panel .panel-header{background:rgba(212,160,23,.12);border-bottom:2px solid var(--overseer-gold);}
        .approval-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap;}
        .approve-btn{background:rgba(0,204,102,.15);border:1px solid var(--overseer-green);color:var(--overseer-green-bright);font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;padding:8px 18px;cursor:pointer;transition:all .2s;}
        .approve-btn:hover{background:rgba(0,204,102,.3);}
        .reject-btn{background:rgba(204,34,0,.15);border:1px solid var(--overseer-red-bright);color:var(--overseer-red-bright);font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;padding:8px 18px;cursor:pointer;transition:all .2s;}
        .reject-btn:hover{background:rgba(204,34,0,.3);}

        /* ── STATUS INDICATOR ────────────────────────────────── */
        #connStatus{font-size:10px;letter-spacing:1px;padding:4px 10px;border:1px solid currentColor;color:var(--overseer-gold);}
        #connStatus.live{color:var(--overseer-green-bright);border-color:var(--overseer-green);}
        #connStatus.offline{color:rgba(232,232,232,.4);border-color:rgba(232,232,232,.2);}

        /* ── MASTER RECIPE ROWS ──────────────────────────────── */
        .master-badge{font-size:8px;padding:1px 6px;border-radius:2px;background:rgba(212,160,23,.2);color:var(--overseer-gold);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
        .master-badge.custom{background:rgba(0,204,102,.2);color:var(--overseer-green-bright);}
    </style>
</head>
<body>
<script src="../../assets/logic/fallout_stat_bonuses.js"></script>
<script src="../../assets/helpers/navigation/overseer-navigation.js"></script>

<!-- ══════════════════════════════════════════════════════════════════
     COMMAND BAR
══════════════════════════════════════════════════════════════════ -->
<div class="command-bar" role="banner">
    <div class="command-bar-left">
        <div>
            <div class="overseer-title-bar">🛠️ CRAFTING RECIPE MANAGER</div>
            <div class="overseer-badge">⬡ VAULT 215 AUTHORITY CONSOLE — CRAFTING MODULE</div>
        </div>
        <span id="campaignDisplay" style="font-size:10px;color:rgba(212,160,23,.6);letter-spacing:1px;text-transform:uppercase;"></span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
        <span id="connStatus" class="offline">⬤ OFFLINE</span>
        <button class="cmd-btn success" onclick="showNewRecipeForm()" title="Create a new crafting recipe">+ NEW RECIPE</button>
        <button class="cmd-btn" onclick="exportRecipes()" title="Export all recipes as JSON">⬇ EXPORT</button>
    </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════
     MAIN CONTENT
══════════════════════════════════════════════════════════════════ -->
<div class="page-content">

    <!-- PENDING APPROVAL REQUESTS (shown only when requests exist) -->
    <div class="panel pending-panel" id="pendingPanel" style="display:none">
        <div class="panel-header">
            <span class="panel-title">⚠ PENDING CRAFT APPROVALS</span>
            <span class="req-badge" id="pendingBadge">0</span>
        </div>
        <div class="panel-body">
            <div class="req-list" id="pendingList"></div>
        </div>
    </div>

    <div class="two-col">

        <!-- LEFT: Recipe List -->
        <div>
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">📜 MASTER RECIPE LIBRARY</span>
                    <span style="font-size:10px;color:rgba(232,232,232,.5);" id="recipeCount">0 recipes</span>
                </div>
                <div class="panel-body">
                    <div class="filter-row">
                        <input class="filter-input" type="text" id="recipeSearch" placeholder="Search recipes…" oninput="filterRecipes()">
                        <select class="filter-select" id="recipeTypeFilter" onchange="filterRecipes()">
                            <option value="">All Types</option>
                            <option value="weapon">Weapon</option>
                            <option value="consumable">Consumable</option>
                            <option value="armor">Armor</option>
                            <option value="explosive">Explosive</option>
                            <option value="tool">Tool</option>
                            <option value="misc">Misc</option>
                        </select>
                    </div>
                    <div class="recipe-list" id="recipeList"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT: Panels -->
        <div>

            <!-- Approval Review Panel (hidden by default) -->
            <div class="panel approval-panel hidden" id="approvalPanel">
                <div class="panel-header">
                    <span class="panel-title">📋 REVIEW CRAFT REQUEST — <span id="approvalPlayerName"></span></span>
                    <button class="cmd-btn" onclick="dismissApproval()">✕ DISMISS</button>
                </div>
                <div class="panel-body">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
                        <div class="form-group">
                            <label class="form-label">Item Name (editable)</label>
                            <input class="form-input" type="text" id="apName">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Item Type (editable)</label>
                            <select class="form-select" id="apType">
                                <option value="weapon">Weapon</option>
                                <option value="armor">Armor</option>
                                <option value="consumable">Consumable</option>
                                <option value="tool">Tool</option>
                                <option value="explosive">Explosive</option>
                                <option value="misc" selected>Misc</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description (editable)</label>
                        <textarea class="form-textarea" id="apDescription"></textarea>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="form-group">
                            <label class="form-label">Weight (lb) — auto-calc, editable</label>
                            <input class="form-input" type="number" id="apWeight" min="0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Value (¢) — auto-calc, editable</label>
                            <input class="form-input" type="number" id="apValue" min="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ingredients Requested</label>
                        <div id="apIngredients" style="display:flex;flex-direction:column;gap:5px;margin-top:5px;"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Overseer Notes (optional)</label>
                        <textarea class="form-textarea" id="apNotes" placeholder="Add notes for the player's recipe book…"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Rejection Reason (if rejecting)</label>
                        <input class="form-input" type="text" id="apRejectReason" placeholder="e.g. Item is overpowered — rebalance ingredients">
                    </div>
                    <div class="approval-actions">
                        <button class="reject-btn" onclick="rejectRequest()">✕ REJECT</button>
                        <button class="approve-btn" onclick="approveRequest()">✓ APPROVE & CRAFT</button>
                    </div>
                </div>
            </div>

            <!-- Recipe Detail View -->
            <div class="panel" id="recipeDetailPanel">
                <div class="panel-header">
                    <span class="panel-title">📋 RECIPE DETAILS — <span id="detailRecipeName">SELECT A RECIPE</span></span>
                    <div style="display:flex;gap:6px;">
                        <button class="cmd-btn" onclick="editRecipe()" title="Edit this recipe">✏ EDIT</button>
                        <button class="cmd-btn danger" onclick="deleteRecipe()" title="Delete this recipe">🗑 DELETE</button>
                    </div>
                </div>
                <div class="panel-body" id="recipeDetailBody">
                    <div style="font-size:11px;color:rgba(232,232,232,.4);text-align:center;padding:20px;">
                        [ SELECT A RECIPE FROM THE LIBRARY ]
                    </div>
                </div>
            </div>

            <!-- Recipe Editor Form (hidden by default) -->
            <div class="panel hidden" id="recipeEditorPanel">
                <div class="panel-header">
                    <span class="panel-title" id="editorTitle">✏ EDIT RECIPE</span>
                    <button class="cmd-btn" onclick="cancelEdit()">✕ CANCEL</button>
                </div>
                <div class="panel-body">
                    <div class="form-group">
                        <label class="form-label">Recipe Name *</label>
                        <input class="form-input" type="text" id="editName" placeholder="e.g. Baseball Grenade">
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="form-group">
                            <label class="form-label">Type</label>
                            <select class="form-select" id="editType">
                                <option value="weapon">Weapon</option>
                                <option value="consumable">Consumable</option>
                                <option value="armor">Armor</option>
                                <option value="explosive">Explosive</option>
                                <option value="tool">Tool</option>
                                <option value="misc" selected>Misc</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Skill Required</label>
                            <input class="form-input" type="text" id="editSkill" placeholder="e.g. Explosives 25">
                        </div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="form-group">
                            <label class="form-label">Weight (lb)</label>
                            <input class="form-input" type="number" id="editWeight" min="0" step="0.1" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Value (¢)</label>
                            <input class="form-input" type="number" id="editValue" min="0" placeholder="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Ingredients</label>
                        <div id="editIngredients" style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;"></div>
                        <button class="cmd-btn" onclick="addIngredientRow()" style="font-size:10px;padding:5px 12px;">+ ADD INGREDIENT</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Notes / Description</label>
                        <textarea class="form-textarea" id="editNotes" placeholder="Overseer notes about this recipe…"></textarea>
                    </div>
                    <div class="form-actions">
                        <button class="cmd-btn danger" onclick="cancelEdit()">CANCEL</button>
                        <button class="cmd-btn success" onclick="saveRecipe()">💾 SAVE RECIPE</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- STATUS TOAST -->
<div id="statusToast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function() {
    // ── Auth guard ────────────────────────────────────────────────────────────
    var _role = sessionStorage.getItem('role');
    if (_role !== 'admin') { window.location.replace('../login.html'); return; }

    // ── Credentials ───────────────────────────────────────────────────────────
    var _sessionCode = localStorage.getItem('OVERSEER_SESSION_CODE') || sessionStorage.getItem('sessionCode') || 'VAULT01';
    var _adminCode   = localStorage.getItem('OVERSEER_ADMIN_CODE')   || sessionStorage.getItem('adminCode')   || 'OVERSEER215';

    // ── Campaign display ──────────────────────────────────────────────────────
    var cname = sessionStorage.getItem('campaignName') || sessionStorage.getItem('campaignId') || '';
    if (cname) {
        var el = document.getElementById('campaignDisplay');
        if (el) el.textContent = '⚑ ' + cname;
    }

    // ── escape ────────────────────────────────────────────────────────────────
    function escapeHtml(t) {
        if (t === null || t === undefined) return '';
        return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    function jsStr(t) {
        if (t === null || t === undefined) return '';
        return String(t)
            .replace(/\\/g,'\\\\')
            .replace(/'/g,"\\'")
            .replace(/\n/g,'\\n')
            .replace(/\r/g,'\\r');
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  MASTER RECIPE BOOK  (localStorage + server-side campaign pool)
    // ═══════════════════════════════════════════════════════════════════════════
    var LS_MASTER = 'vault_recipes_v1_overseer';
    var masterRecipes = [];
    var selectedRecipeId = null;

    function _getSessionCode() {
        return (localStorage.getItem('PIPBOY_SESSION_CODE') || '').toUpperCase().trim() ||
               (sessionStorage.getItem('campaignId') || '').toUpperCase().trim() || 'VAULT01';
    }

    function loadMasterRecipes() {
        // Try loading from server first; fall back to localStorage
        var code = _getSessionCode();
        fetch('/api/campaigns/' + code + '/pools')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data && data.pools && Array.isArray(data.pools.recipes) && data.pools.recipes.length > 0) {
                    masterRecipes = data.pools.recipes;
                    renderRecipeList();
                } else {
                    _loadRecipesFromLocalStorage();
                }
            })
            .catch(function() { _loadRecipesFromLocalStorage(); });
    }

    function _loadRecipesFromLocalStorage() {
        var wasEmpty = false;
        try { masterRecipes = JSON.parse(localStorage.getItem(LS_MASTER) || '[]'); } catch(e) { masterRecipes = []; }
        // Seed built-in recipes on first load only
        if (masterRecipes.length === 0) {
            wasEmpty = true;
            masterRecipes = [
                { recipeId:'builtin_molotov', name:'Molotov Cocktail', type:'weapon', weight:0.5, value:50,
                  description:'Improvised incendiary. Nuka-Cola bottle + cloth.', ingredients:[], notes:'', source:'builtin' },
                { recipeId:'builtin_medkit',  name:'Field Medkit',     type:'consumable', weight:1, value:100,
                  description:'Jury-rigged medkit from Stimpaks and RadAway.', ingredients:[], notes:'', source:'builtin' }
            ];
        }
        // Only mirror to server when seeding fresh data for the first time
        if (wasEmpty) { saveMasterRecipes(); } else { try { localStorage.setItem(LS_MASTER, JSON.stringify(masterRecipes)); } catch(e) {} }
        renderRecipeList();
    }

    function saveMasterRecipes() {
        // Save to localStorage (immediate, works offline)
        try { localStorage.setItem(LS_MASTER, JSON.stringify(masterRecipes)); } catch(e) {}
        // Mirror to server-side campaign pool (persistent across devices/restarts)
        var code = _getSessionCode();
        if (code) {
            fetch('/api/campaigns/' + code + '/pools/recipes', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: masterRecipes })
            }).catch(function(e) { console.warn('[recipes autosave] failed:', e.message); });
        }
    }

    function addToMasterRecipes(recipe) {
        for (var i = 0; i < masterRecipes.length; i++) {
            if (masterRecipes[i].recipeId === recipe.recipeId) { masterRecipes[i] = recipe; saveMasterRecipes(); return; }
        }
        masterRecipes.push(recipe);
        saveMasterRecipes();
    }

    function deleteMasterRecipe(recipeId) {
        masterRecipes = masterRecipes.filter(function(r){ return r.recipeId !== recipeId; });
        saveMasterRecipes();
    }

    // ── Render Recipe Library ─────────────────────────────────────────────────
    function renderRecipeList() {
        var listEl   = document.getElementById('recipeList');
        var countEl  = document.getElementById('recipeCount');
        if (!listEl) return;

        var q = (document.getElementById('recipeSearch') || {value:''}).value.toLowerCase();
        var t = (document.getElementById('recipeTypeFilter') || {value:''}).value;

        var filtered = masterRecipes.filter(function(r){
            return (!q || r.name.toLowerCase().includes(q)) && (!t || r.type === t);
        });

        if (countEl) countEl.textContent = masterRecipes.length + ' recipe' + (masterRecipes.length !== 1 ? 's' : '');

        if (filtered.length === 0) {
            listEl.innerHTML = '<div style="padding:12px;font-size:11px;color:rgba(232,232,232,.4);text-align:center;">[ NO RECIPES ]</div>';
            return;
        }

        var html = '';
        filtered.forEach(function(r) {
            var isActive = selectedRecipeId === r.recipeId;
            var isCustom = r.source === 'approved-request';
            html += '<div class="recipe-item' + (isActive ? ' active' : '') + '" onclick="selectMasterRecipe(\'' + jsStr(r.recipeId) + '\')" data-type="' + escapeHtml(r.type) + '">' +
                '<div class="recipe-item-info">' +
                    '<div class="recipe-name">' + escapeHtml(r.name) + '</div>' +
                    '<div class="recipe-meta">' + escapeHtml(r.type || 'misc').toUpperCase() + ' · Wt:' + (r.weight || 0) + ' Val:' + (r.value || 0) + (r.createdBy ? ' · by ' + escapeHtml(r.createdBy) : '') + '</div>' +
                '</div>' +
                '<span class="master-badge' + (isCustom ? ' custom' : '') + '">' + (isCustom ? 'CUSTOM' : 'STANDARD') + '</span>' +
            '</div>';
        });
        listEl.innerHTML = html;
    }

    window.selectMasterRecipe = function(recipeId) {
        selectedRecipeId = recipeId;
        var recipe = null;
        for (var i = 0; i < masterRecipes.length; i++) {
            if (masterRecipes[i].recipeId === recipeId) { recipe = masterRecipes[i]; break; }
        }
        renderRecipeList();
        document.getElementById('recipeDetailPanel').classList.remove('hidden');
        document.getElementById('approvalPanel').classList.add('hidden');
        document.getElementById('recipeEditorPanel').classList.add('hidden');

        var nameEl   = document.getElementById('detailRecipeName');
        var bodyEl   = document.getElementById('recipeDetailBody');
        if (!recipe) { if (nameEl) nameEl.textContent = '—'; return; }
        if (nameEl) nameEl.textContent = recipe.name.toUpperCase();

        var ingsHtml = '';
        (recipe.ingredients || []).forEach(function(ing) {
            ingsHtml += '<div class="ingredient-row" style="cursor:default;"><span style="font-size:10px;color:var(--overseer-gold);min-width:30px;">1×</span><span class="ingredient-name">' + escapeHtml(ing.name) + '</span></div>';
        });
        if (!ingsHtml) ingsHtml = '<div style="font-size:11px;color:rgba(232,232,232,.4);">None listed.</div>';

        bodyEl.innerHTML =
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">' +
                '<div>' +
                    '<div class="detail-section"><div class="detail-label">Recipe Name</div><div class="detail-value">' + escapeHtml(recipe.name) + '</div></div>' +
                    '<div class="detail-section"><div class="detail-label">Type</div><div class="detail-value">' + escapeHtml(recipe.type || 'misc').toUpperCase() + '</div></div>' +
                    (recipe.createdBy ? '<div class="detail-section"><div class="detail-label">Created By</div><div class="detail-value">' + escapeHtml(recipe.createdBy) + '</div></div>' : '') +
                '</div>' +
                '<div>' +
                    '<div class="detail-section"><div class="detail-label">Weight</div><div class="detail-value">' + (recipe.weight || 0) + ' lb</div></div>' +
                    '<div class="detail-section"><div class="detail-label">Value</div><div class="detail-value">' + (recipe.value || 0) + '¢</div></div>' +
                '</div>' +
            '</div>' +
            '<div class="detail-section" style="margin-top:8px;"><div class="detail-label">Description</div><div class="detail-value" style="color:rgba(232,232,232,.7);font-style:italic;">' + escapeHtml(recipe.description || '—') + '</div></div>' +
            '<div class="detail-section" style="margin-top:8px;"><div class="detail-label">Ingredients</div><div style="margin-top:6px;display:flex;flex-direction:column;gap:5px;">' + ingsHtml + '</div></div>' +
            (recipe.notes ? '<div class="detail-section" style="margin-top:8px;"><div class="detail-label">Notes</div><div class="detail-value" style="color:rgba(212,160,23,.8);font-style:italic;">' + escapeHtml(recipe.notes) + '</div></div>' : '');
    };

    window.filterRecipes = function() { renderRecipeList(); };

    // ── Recipe Editor ─────────────────────────────────────────────────────────
    var editingRecipeId = null;

    window.showNewRecipeForm = function() {
        editingRecipeId = null;
        document.getElementById('editorTitle').textContent = '+ NEW RECIPE';
        document.getElementById('editName').value = '';
        document.getElementById('editSkill').value = '';
        document.getElementById('editWeight').value = '';
        document.getElementById('editValue').value = '';
        document.getElementById('editNotes').value = '';
        document.getElementById('editIngredients').innerHTML = '';
        document.getElementById('recipeDetailPanel').classList.add('hidden');
        document.getElementById('approvalPanel').classList.add('hidden');
        document.getElementById('recipeEditorPanel').classList.remove('hidden');
    };

    window.editRecipe = function() {
        if (!selectedRecipeId) return;
        var recipe = null;
        for (var i = 0; i < masterRecipes.length; i++) {
            if (masterRecipes[i].recipeId === selectedRecipeId) { recipe = masterRecipes[i]; break; }
        }
        if (!recipe) return;
        editingRecipeId = recipe.recipeId;
        document.getElementById('editorTitle').textContent = '✏ EDIT — ' + recipe.name.toUpperCase();
        document.getElementById('editName').value   = recipe.name;
        document.getElementById('editWeight').value = recipe.weight || 0;
        document.getElementById('editValue').value  = recipe.value  || 0;
        document.getElementById('editNotes').value  = recipe.notes  || '';
        // Populate ingredients
        var ingsEl = document.getElementById('editIngredients');
        ingsEl.innerHTML = '';
        (recipe.ingredients || []).forEach(function(ing) { addIngredientRowWith(ing.name); });
        // Set type select
        var typeEl = document.getElementById('editType');
        if (typeEl) typeEl.value = recipe.type || 'misc';
        document.getElementById('recipeDetailPanel').classList.add('hidden');
        document.getElementById('approvalPanel').classList.add('hidden');
        document.getElementById('recipeEditorPanel').classList.remove('hidden');
    };

    window.cancelEdit = function() {
        document.getElementById('recipeEditorPanel').classList.add('hidden');
        document.getElementById('recipeDetailPanel').classList.remove('hidden');
    };

    window.saveRecipe = function() {
        var name = document.getElementById('editName').value.trim();
        if (!name) { showToast('Recipe name is required.', true); return; }
        var ings = [];
        document.querySelectorAll('#editIngredients .ing-name-input').forEach(function(inp) {
            var n = inp.value.trim();
            if (n) ings.push({ name: n });
        });
        var recipe = {
            recipeId:    editingRecipeId || ('recipe_' + Date.now() + '_' + Math.random().toString(36).slice(2,6)),
            name:        name,
            type:        document.getElementById('editType').value || 'misc',
            weight:      parseFloat(document.getElementById('editWeight').value) || 0,
            value:       parseFloat(document.getElementById('editValue').value)  || 0,
            description: '',
            notes:       document.getElementById('editNotes').value.trim(),
            ingredients: ings,
            source:      'overseer'
        };
        addToMasterRecipes(recipe);
        selectedRecipeId = recipe.recipeId;
        renderRecipeList();
        cancelEdit();
        window.selectMasterRecipe(recipe.recipeId);
        showToast('Recipe "' + name + '" saved.');
    };

    window.deleteRecipe = function() {
        if (!selectedRecipeId) return;
        var recipe = null;
        for (var i = 0; i < masterRecipes.length; i++) {
            if (masterRecipes[i].recipeId === selectedRecipeId) { recipe = masterRecipes[i]; break; }
        }
        if (!recipe) return;
        if (confirm('Delete recipe "' + recipe.name + '"? This cannot be undone.')) {
            deleteMasterRecipe(selectedRecipeId);
            selectedRecipeId = null;
            renderRecipeList();
            var bodyEl = document.getElementById('recipeDetailBody');
            if (bodyEl) bodyEl.innerHTML = '<div style="font-size:11px;color:rgba(232,232,232,.4);text-align:center;padding:20px;">[ SELECT A RECIPE FROM THE LIBRARY ]</div>';
            document.getElementById('detailRecipeName').textContent = 'SELECT A RECIPE';
            showToast('Recipe deleted.');
        }
    };

    function addIngredientRowWith(name) {
        var row = document.createElement('div');
        row.className = 'ingredient-row';
        row.innerHTML = '<input class="form-input ing-name-input" type="text" placeholder="Ingredient name" value="' + escapeHtml(name || '') + '" style="flex:1;">' +
            '<button class="ingredient-remove" onclick="this.closest(\'.ingredient-row\').remove()" type="button">✕</button>';
        document.getElementById('editIngredients').appendChild(row);
    }

    window.addIngredientRow = function() { addIngredientRowWith(''); };

    // ── Export ────────────────────────────────────────────────────────────────
    window.exportRecipes = function() {
        try {
            var blob = new Blob([JSON.stringify(masterRecipes, null, 2)], {type:'application/json'});
            var url  = URL.createObjectURL(blob);
            var a    = document.createElement('a');
            a.href = url; a.download = 'crafting-recipes.json'; a.click();
            URL.revokeObjectURL(url);
            showToast('Recipes exported.');
        } catch(e) { showToast('Export failed: ' + e.message, true); }
    };

    // ═══════════════════════════════════════════════════════════════════════════
    //  PENDING CRAFT REQUEST APPROVAL
    // ═══════════════════════════════════════════════════════════════════════════
    var pendingRequests  = [];   // { requestId, fromHandle, name, description, type, ingredients, totalWeight, totalValue, timestamp }
    var activeRequestId  = null;
    var _socket          = null;

    function addUniqueRequest(req) {
        if (!req || !req.requestId) return false;
        for (var i = 0; i < pendingRequests.length; i++) {
            if (pendingRequests[i].requestId === req.requestId) return false;
        }
        pendingRequests.push(req);
        return true;
    }

    function renderPendingPanel() {
        var panelEl  = document.getElementById('pendingPanel');
        var listEl   = document.getElementById('pendingList');
        var badgeEl  = document.getElementById('pendingBadge');
        if (!panelEl || !listEl) return;

        if (pendingRequests.length === 0) {
            panelEl.style.display = 'none';
            return;
        }
        panelEl.style.display = '';
        if (badgeEl) badgeEl.textContent = pendingRequests.length;

        var html = '';
        pendingRequests.forEach(function(req) {
            var isActive = activeRequestId === req.requestId;
            html += '<div class="req-row' + (isActive ? ' active' : '') + '" onclick="reviewRequest(\'' + jsStr(req.requestId) + '\')">' +
                '<div class="req-row-info">' +
                    '<div class="req-row-name">' + escapeHtml(req.name) + '</div>' +
                    '<div class="req-row-from">From: ' + escapeHtml(req.fromHandle) + '</div>' +
                    '<div class="req-row-meta">' + escapeHtml(req.type || 'misc').toUpperCase() + ' · ' + (req.ingredients || []).length + ' ingredient(s) · Wt:' + (req.totalWeight || 0) + ' Val:' + (req.totalValue || 0) + '</div>' +
                '</div>' +
            '</div>';
        });
        listEl.innerHTML = html;
    }

    window.reviewRequest = function(requestId) {
        var req = null;
        for (var i = 0; i < pendingRequests.length; i++) {
            if (pendingRequests[i].requestId === requestId) { req = pendingRequests[i]; break; }
        }
        if (!req) return;
        activeRequestId = requestId;
        renderPendingPanel();

        // Populate approval form
        document.getElementById('approvalPlayerName').textContent = req.fromHandle.toUpperCase();
        document.getElementById('apName').value        = req.name;
        document.getElementById('apDescription').value = req.description || '';
        document.getElementById('apWeight').value      = req.totalWeight || 0;
        document.getElementById('apValue').value       = req.totalValue  || 0;
        document.getElementById('apNotes').value       = '';
        document.getElementById('apRejectReason').value = '';

        // Set type select
        var typeEl = document.getElementById('apType');
        if (typeEl) typeEl.value = req.type || 'misc';

        // Show ingredients
        var ingsEl = document.getElementById('apIngredients');
        var ingsHtml = '';
        (req.ingredients || []).forEach(function(ing) {
            ingsHtml += '<div class="ingredient-row" style="cursor:default;">' +
                '<span class="ingredient-name">' + escapeHtml(ing.name) + '</span>' +
                '<span style="font-size:9px;color:rgba(232,232,232,.4);">Wt:' + (ing.weight||0) + ' Val:' + (ing.value||0) + '</span>' +
            '</div>';
        });
        ingsEl.innerHTML = ingsHtml || '<div style="font-size:11px;color:rgba(232,232,232,.4);">No ingredients specified.</div>';

        document.getElementById('approvalPanel').classList.remove('hidden');
        document.getElementById('recipeDetailPanel').classList.add('hidden');
        document.getElementById('recipeEditorPanel').classList.add('hidden');
    };

    window.dismissApproval = function() {
        activeRequestId = null;
        renderPendingPanel();
        document.getElementById('approvalPanel').classList.add('hidden');
        document.getElementById('recipeDetailPanel').classList.remove('hidden');
    };

    window.approveRequest = function() {
        if (!activeRequestId || !_socket) return;
        var name        = document.getElementById('apName').value.trim();
        var description = document.getElementById('apDescription').value.trim();
        var type        = document.getElementById('apType').value;
        var weight      = parseFloat(document.getElementById('apWeight').value) || 0;
        var value       = parseFloat(document.getElementById('apValue').value)  || 0;
        var notes       = document.getElementById('apNotes').value.trim();
        if (!name) { showToast('Item name is required.', true); return; }
        _socket.emit('craft:approve', { requestId: activeRequestId, name: name, description: description, type: type, totalWeight: weight, totalValue: value, notes: notes });
        // Optimistically remove from pending
        pendingRequests = pendingRequests.filter(function(r){ return r.requestId !== activeRequestId; });
        activeRequestId = null;
        renderPendingPanel();
        document.getElementById('approvalPanel').classList.add('hidden');
        document.getElementById('recipeDetailPanel').classList.remove('hidden');
        showToast('Request approved! Item crafted for player.');
    };

    window.rejectRequest = function() {
        if (!activeRequestId || !_socket) return;
        var reason = document.getElementById('apRejectReason').value.trim() || 'Request was not approved.';
        _socket.emit('craft:reject', { requestId: activeRequestId, reason: reason });
        pendingRequests = pendingRequests.filter(function(r){ return r.requestId !== activeRequestId; });
        activeRequestId = null;
        renderPendingPanel();
        document.getElementById('approvalPanel').classList.add('hidden');
        document.getElementById('recipeDetailPanel').classList.remove('hidden');
        showToast('Request rejected. Player notified.');
    };

    // ═══════════════════════════════════════════════════════════════════════════
    //  SOCKET.IO
    // ═══════════════════════════════════════════════════════════════════════════
    function setConnStatus(cls, txt) {
        var el = document.getElementById('connStatus');
        if (el) { el.className = cls; el.textContent = txt; }
    }

    function initSocket() {
        if (typeof io === 'undefined') return;
        try { _socket = io('', { transports: ['websocket', 'polling'] }); } catch(e) { return; }

        _socket.on('connect', function() {
            setConnStatus('', '⬤ CONNECTING…');
            _socket.emit('overseer:join', { sessionCode: _sessionCode, adminCode: _adminCode });
        });

        _socket.on('session:joined', function() {
            setConnStatus('live', '⬤ LIVE');
        });

        _socket.on('disconnect', function() {
            setConnStatus('offline', '⬤ OFFLINE');
        });

        // Server sends all pending requests when overseer connects mid-session
        _socket.on('craft:pending-requests-sync', function(payload) {
            var reqs = Array.isArray(payload.requests) ? payload.requests : [];
            reqs.forEach(function(req) { addUniqueRequest(req); });
            renderPendingPanel();
        });

        // New craft request from a player
        _socket.on('craft:pending-request', function(req) {
            if (!addUniqueRequest(req)) return;
            renderPendingPanel();
            showToast('⚠ New craft request from ' + req.fromHandle + ': "' + req.name + '"');
        });

        // Server echoes approved recipe back to Overseer → save to master book
        _socket.on('craft:recipe-saved', function(payload) {
            var recipe = payload && payload.recipe;
            if (!recipe) return;
            addToMasterRecipes(recipe);
            renderRecipeList();
        });
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg, isError) {
        var t = document.getElementById('statusToast');
        if (!t) return;
        t.textContent = msg;
        t.className   = isError ? 'error visible' : 'visible';
        clearTimeout(t._timer);
        t._timer = setTimeout(function(){ t.className = isError ? 'error' : ''; }, 4000);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    loadMasterRecipes();
    renderPendingPanel();
    initSocket();

})();
</script>
</body>
</html>
