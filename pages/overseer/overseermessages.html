<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault 215 — Overseer Messages</title>
    <link rel="stylesheet" href="../../css/branding.css">
    <link rel="stylesheet" href="../../css/overseer/overseerstyle.css">
    <style>
        :root {
            --overseer-blue:        #0a1628;
            --overseer-blue-mid:    #0d2045;
            --overseer-blue-bright: #1a3a6e;
            --overseer-gold:        #d4a017;
            --overseer-gold-bright: #f0c040;
            --overseer-gold-dim:    #8b6914;
            --overseer-white:       #e8e8e8;
            --overseer-red:         #cc2200;
            --overseer-red-bright:  #ff3300;
            --overseer-green:       #00cc66;
            --overseer-green-bright:#00ff80;
            --overseer-dark:        #04080f;
            --overseer-border:      #2a5298;
            --overseer-glow-gold:   rgba(212,160,23,0.6);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;overflow:hidden;}
        body{width:100%;background-color:var(--overseer-dark);color:var(--overseer-white);font-family:'Courier New',monospace;display:flex;flex-direction:column;}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,.18),rgba(0,0,0,.18) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:9999;}

        /* ── COMMAND BAR ─── */
        .command-bar{background:var(--overseer-blue-mid);border-bottom:2px solid var(--overseer-gold);box-shadow:0 2px 20px var(--overseer-glow-gold);padding:14px 24px 14px 80px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;flex-shrink:0;z-index:100;position:relative;}
        .command-bar-left{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
        .overseer-title-bar{font-size:18px;font-weight:bold;color:var(--overseer-gold-bright);letter-spacing:3px;text-shadow:0 0 10px var(--overseer-glow-gold);}
        .overseer-badge{font-size:9px;color:var(--overseer-gold-bright);letter-spacing:2px;text-transform:uppercase;}
        #conn-status{font-size:10px;letter-spacing:1px;}
        #conn-status.live{color:var(--overseer-green-bright);}
        #conn-status.error{color:var(--overseer-red-bright);}
        .cmd-btn{background:transparent;border:1px solid var(--overseer-gold);color:var(--overseer-gold);font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;padding:7px 14px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
        .cmd-btn:hover{background:rgba(212,160,23,.15);box-shadow:0 0 10px rgba(212,160,23,.3);}

        /* ── LAYOUT ── */
        #msgLayout{display:flex;flex:1;overflow:hidden;}

        /* ── SIDEBAR ── */
        #msgSidebar{width:300px;min-width:300px;flex-shrink:0;border-right:1px solid var(--overseer-border);background:var(--overseer-blue-mid);display:flex;flex-direction:column;overflow:hidden;}
        #sidebarTop{padding:10px;border-bottom:1px solid var(--overseer-border);background:var(--overseer-blue-bright);flex-shrink:0;display:flex;flex-direction:column;gap:7px;}
        #newConvBtn{width:100%;background:transparent;border:1px solid var(--overseer-gold);color:var(--overseer-gold);font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;padding:7px 12px;cursor:pointer;transition:all .2s;text-transform:uppercase;text-align:left;}
        #newConvBtn:hover{background:rgba(212,160,23,.12);box-shadow:0 0 8px rgba(212,160,23,.3);}
        #convSearch{width:100%;background:var(--overseer-dark);border:1px solid var(--overseer-border);color:var(--overseer-white);font-family:'Courier New',monospace;font-size:11px;padding:6px 9px;outline:none;}
        #convSearch:focus{border-color:var(--overseer-gold);}
        #convSearch::placeholder{color:rgba(232,232,232,.3);}
        #convList{flex:1;overflow-y:auto;}
        #convList::-webkit-scrollbar{width:4px;}
        #convList::-webkit-scrollbar-track{background:var(--overseer-dark);}
        #convList::-webkit-scrollbar-thumb{background:var(--overseer-blue-bright);}
        .conv-section-label{padding:5px 10px;font-size:9px;color:rgba(232,232,232,.4);letter-spacing:2px;border-bottom:1px solid rgba(42,82,152,.3);text-transform:uppercase;}
        .conv-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(42,82,152,.3);display:flex;flex-direction:column;gap:3px;transition:background .15s;}
        .conv-item:hover{background:rgba(212,160,23,.05);}
        .conv-item.active{background:rgba(212,160,23,.1);border-left:3px solid var(--overseer-gold);}
        .conv-top{display:flex;justify-content:space-between;align-items:center;}
        .conv-name{font-size:12px;font-weight:bold;color:var(--overseer-gold-bright);text-transform:uppercase;letter-spacing:.5px;}
        .conv-name.unread{color:#fff;}
        .conv-time{font-size:9px;color:rgba(232,232,232,.4);}
        .conv-preview{font-size:10px;color:rgba(232,232,232,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
        .conv-preview.unread{color:rgba(232,232,232,.75);}
        .unread-badge{background:var(--overseer-gold);color:#000;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:bold;min-width:18px;text-align:center;}

        /* ── MESSAGE THREAD ── */
        #msgDetail{flex:1;display:flex;flex-direction:column;overflow:hidden;}
        #detailEmpty{flex:1;display:flex;align-items:center;justify-content:center;color:rgba(212,160,23,.25);font-size:14px;letter-spacing:3px;text-transform:uppercase;}
        #threadContent{display:none;flex:1;flex-direction:column;overflow:hidden;}
        #threadHeader{padding:10px 16px;border-bottom:1px solid var(--overseer-border);background:var(--overseer-blue-bright);flex-shrink:0;display:flex;justify-content:space-between;align-items:center;}
        #threadHeaderLeft h2{font-size:13px;color:var(--overseer-gold-bright);letter-spacing:2px;text-transform:uppercase;}
        #threadHeaderLeft p{font-size:9px;color:rgba(232,232,232,.5);}
        #threadHeaderActions{display:flex;gap:6px;}
        .hdr-btn{background:transparent;border:1px solid var(--overseer-border);color:var(--overseer-white);font-family:'Courier New',monospace;font-size:10px;padding:5px 10px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
        .hdr-btn:hover{border-color:var(--overseer-gold);color:var(--overseer-gold-bright);}
        #messageThread{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
        #messageThread::-webkit-scrollbar{width:5px;}
        #messageThread::-webkit-scrollbar-track{background:var(--overseer-dark);}
        #messageThread::-webkit-scrollbar-thumb{background:var(--overseer-blue-bright);border-radius:3px;}
        .msg-bubble{max-width:75%;display:flex;flex-direction:column;gap:3px;}
        .msg-bubble.sent{align-self:flex-end;align-items:flex-end;}
        .msg-bubble.received{align-self:flex-start;align-items:flex-start;}
        .msg-sender{font-size:9px;color:rgba(232,232,232,.45);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
        .msg-body{padding:9px 13px;font-size:11px;line-height:1.5;border-radius:2px;}
        .msg-bubble.sent .msg-body{background:var(--overseer-blue-bright);border:1px solid var(--overseer-gold-dim);color:var(--overseer-white);}
        .msg-bubble.received .msg-body{background:rgba(42,82,152,.35);border:1px solid var(--overseer-border);color:var(--overseer-white);}
        .msg-time{font-size:9px;color:rgba(232,232,232,.3);}

        /* ── COMPOSE ── */
        #composeArea{border-top:2px solid var(--overseer-gold);background:var(--overseer-blue-mid);padding:12px 16px;flex-shrink:0;}
        #composeRow{display:flex;gap:8px;align-items:flex-end;}
        #msgTextarea{flex:1;background:var(--overseer-dark);border:1px solid var(--overseer-border);color:var(--overseer-white);font-family:'Courier New',monospace;font-size:11px;padding:8px 10px;resize:none;height:60px;outline:none;line-height:1.5;transition:border-color .2s;}
        #msgTextarea:focus{border-color:var(--overseer-gold);}
        #msgTextarea::placeholder{color:rgba(232,232,232,.3);}
        #sendBtn{background:var(--overseer-blue-bright);border:2px solid var(--overseer-gold);color:var(--overseer-gold-bright);font-family:'Courier New',monospace;font-size:12px;font-weight:bold;letter-spacing:1px;padding:0 20px;height:60px;cursor:pointer;text-transform:uppercase;transition:all .2s;}
        #sendBtn:hover{background:rgba(212,160,23,.2);box-shadow:0 0 15px rgba(212,160,23,.4);}
        #sendBtn:disabled{opacity:.4;cursor:not-allowed;}

        /* ── STATUS TOAST ── */
        #statusToast{position:fixed;bottom:30px;right:30px;background:var(--overseer-blue-mid);border:2px solid var(--overseer-green);color:var(--overseer-green-bright);font-family:'Courier New',monospace;font-size:12px;padding:12px 20px;z-index:9000;box-shadow:0 0 20px rgba(0,204,102,.4);opacity:0;transition:opacity .3s;pointer-events:none;}
        #statusToast.visible{opacity:1;}
        #statusToast.error{border-color:var(--overseer-red-bright);color:var(--overseer-red-bright);}

        /* ── COMPOSE MODAL ── */
        #compose-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center;}
        #compose-modal.visible{display:flex;}
        #compose-modal-box{background:var(--overseer-blue-mid);border:2px solid var(--overseer-gold);padding:24px;width:360px;max-width:90vw;display:flex;flex-direction:column;gap:14px;box-shadow:0 0 30px rgba(212,160,23,.3);}
        #compose-modal-box h3{font-size:13px;color:var(--overseer-gold-bright);letter-spacing:2px;text-transform:uppercase;}
        #compose-modal-box p{font-size:10px;color:rgba(232,232,232,.5);}
        #recipient-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;}
        .recipient-item{display:flex;align-items:center;gap:10px;padding:7px 9px;border:1px solid var(--overseer-border);cursor:pointer;transition:background .15s;}
        .recipient-item:hover{background:rgba(212,160,23,.07);}
        .recipient-item input[type="checkbox"]{accent-color:var(--overseer-gold);width:14px;height:14px;cursor:pointer;}
        .recipient-item label{font-size:11px;color:var(--overseer-gold-bright);cursor:pointer;flex:1;}
        #compose-modal-actions{display:flex;gap:8px;}
        .modal-btn{flex:1;background:transparent;border:1px solid var(--overseer-gold);color:var(--overseer-gold);padding:8px;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
        .modal-btn:hover{background:rgba(212,160,23,.15);}
        .modal-btn.cancel{border-color:var(--overseer-border);color:rgba(232,232,232,.5);}
        .modal-btn.cancel:hover{border-color:var(--overseer-red-bright);color:var(--overseer-red-bright);}
        #no-roster-msg{font-size:10px;color:rgba(232,232,232,.4);text-align:center;padding:12px 0;}

        ::-webkit-scrollbar{width:6px;}
        ::-webkit-scrollbar-track{background:var(--overseer-dark);}
        ::-webkit-scrollbar-thumb{background:var(--overseer-blue-bright);border-radius:3px;}

        @media(max-width:768px){.command-bar{padding-left:70px;}#msgSidebar{width:220px;min-width:220px;}}
        @media(max-width:600px){#msgLayout{flex-direction:column;}#msgSidebar{width:100%;min-width:0;max-height:260px;border-right:none;border-bottom:1px solid var(--overseer-border);}}
    </style>
</head>
<body>
<script src="../../assets/helpers/navigation/overseer-navigation.js"></script>

<div class="command-bar" role="banner">
    <div class="command-bar-left">
        <div>
            <div class="overseer-title-bar">📻 OVERSEER MESSAGES</div>
            <div class="overseer-badge">⬡ VAULT 215 AUTHORITY CONSOLE — MESSAGING MODULE</div>
        </div>
        <span id="campaignDisplay" style="font-size:10px;color:rgba(212,160,23,.6);letter-spacing:1px;text-transform:uppercase;"></span>
        <span id="conn-status">⬤ OFFLINE</span>
    </div>
    <button class="cmd-btn" onclick="openComposeModal()">+ NEW CONVERSATION</button>
</div>

<div id="msgLayout">
    <!-- LEFT: Conversation list -->
    <div id="msgSidebar">
        <div id="sidebarTop">
            <button id="newConvBtn" onclick="openComposeModal()">+ NEW CONVERSATION</button>
            <input type="text" id="convSearch" placeholder="Search conversations…" oninput="renderConvList()">
        </div>
        <div id="convList"></div>
    </div>

    <!-- RIGHT: Thread -->
    <div id="msgDetail">
        <div id="detailEmpty">[ SELECT A CONVERSATION ]</div>
        <div id="threadContent">
            <div id="threadHeader">
                <div id="threadHeaderLeft">
                    <h2 id="threadTitle"></h2>
                    <p id="threadSub"></p>
                </div>
                <div id="threadHeaderActions">
                    <button class="hdr-btn" onclick="markAllRead()">✓ MARK READ</button>
                    <button class="hdr-btn" onclick="archiveConv()">⬇ ARCHIVE</button>
                </div>
            </div>
            <div id="messageThread"></div>
            <div id="composeArea">
                <div id="composeRow">
                    <textarea id="msgTextarea" placeholder="Type your message…" onkeydown="handleKey(event)"></textarea>
                    <button id="sendBtn" onclick="sendMessage()">► SEND</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="statusToast"></div>

<!-- New conversation modal -->
<div id="compose-modal" role="dialog" aria-modal="true">
    <div id="compose-modal-box">
        <h3>NEW CONVERSATION</h3>
        <p>Select one or more recipients:</p>
        <div id="recipient-list"></div>
        <div id="no-roster-msg" style="display:none">No players connected yet. Start a campaign and wait for players to join.</div>
        <div id="compose-modal-actions">
            <button class="modal-btn" onclick="confirmCompose()">CREATE</button>
            <button class="modal-btn cancel" onclick="closeComposeModal()">CANCEL</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════════
// VAULT 215 — OVERSEER MESSAGES
// Real-time messaging via Socket.IO; localStorage persistence for the Overseer.
// Storage key: vault_msgs_v1_overseer
// Conversation ID: sorted participant handles joined by '::'
// ═══════════════════════════════════════════════════════════════════════════════
(function () {

    // ── Auth guard ───────────────────────────────────────────────────────────
    var _role = sessionStorage.getItem('role');
    if (_role !== 'admin') { window.location.replace('../login.html'); return; }

    var cname = sessionStorage.getItem('campaignName') || sessionStorage.getItem('campaignId') || '';
    var cdEl  = document.getElementById('campaignDisplay');
    if (cname && cdEl) cdEl.textContent = '⚑ ' + cname;

    // ── Credentials ──────────────────────────────────────────────────────────
    var _sessionCode = localStorage.getItem('PIPBOY_SESSION_CODE') || '';
    var _adminCode   = localStorage.getItem('PIPBOY_ADMIN_CODE')   || '';
    var _serverUrl   = localStorage.getItem('PIPBOY_SERVER_URL')   || '';
    var MY_HANDLE    = 'overseer';

    // ── Utils ─────────────────────────────────────────────────────────────────
    function escapeHtml(t) {
        if (!t) return '';
        return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function relativeTime(ts) {
        var diff = Math.floor((Date.now() - ts) / 1000);
        if (diff < 60)     return 'just now';
        if (diff < 3600)   return Math.floor(diff/60)    + 'm ago';
        if (diff < 86400)  return Math.floor(diff/3600)  + 'h ago';
        if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
        return new Date(ts).toLocaleDateString();
    }

    function genId() { return '_' + Math.random().toString(36).substr(2,9); }

    function mkConvId(participants) {
        return participants.map(function(h){ return h.toLowerCase().trim(); }).sort().join('::');
    }

    function convDisplayName(participants) {
        var others = participants.filter(function(p){ return p !== MY_HANDLE; });
        if (others.length === 0) return '(you)';
        return others.join(', ');
    }

    // ── Storage ───────────────────────────────────────────────────────────────
    var STORAGE_KEY = 'vault_msgs_v1_overseer';

    function loadData() {
        try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (raw) return JSON.parse(raw);
        } catch(e) {}
        return { conversations: {} };
    }

    function saveData() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
    }

    // ── App state ─────────────────────────────────────────────────────────────
    var appData      = loadData();
    var activeConvId = null;
    var _roster      = [];  // player handles available to message
    var _socket      = null;
    var _connected   = false;

    // ── Socket ────────────────────────────────────────────────────────────────
    function initSocket() {
        try {
            _socket = io(_serverUrl || '', { transports: ['websocket', 'polling'] });
        } catch(e) {
            setStatus('error', '⬤ OFFLINE');
            return;
        }

        _socket.on('connect', function() {
            setStatus('connecting', '⬤ CONNECTING…');
            _socket.emit('overseer:join', {
                sessionCode: _sessionCode || 'VAULT01',
                adminCode:   _adminCode   || 'OVERSEER215'
            });
        });

        _socket.on('session:joined', function(payload) {
            _connected = true;
            setStatus('live', '⬤ LIVE — OVERSEER @ ' + (payload.sessionCode || _sessionCode));
            // Populate roster from snapshot
            if (payload.players && Array.isArray(payload.players)) {
                _roster = payload.players.map(function(p){ return p.handle; });
            }
            _socket.emit('msg:get-roster');
        });

        _socket.on('msg:roster', function(payload) {
            var players = Array.isArray(payload.players) ? payload.players : [];
            _roster = players.filter(function(p){ return p !== MY_HANDLE; });
        });

        // A player joined — update roster
        _socket.on('overseer:player-joined', function(payload) {
            if (payload.handle && !_roster.includes(payload.handle)) {
                _roster.push(payload.handle);
            }
        });

        // Incoming message from a participant
        _socket.on('msg:incoming', function(payload) {
            if (!payload || !payload.convId) return;
            handleIncomingMsg(payload);
        });

        _socket.on('disconnect', function() {
            _connected = false;
            setStatus('error', '⬤ DISCONNECTED — reconnecting…');
        });

        _socket.on('error:join', function(err) {
            setStatus('error', '⬤ AUTH ERROR: ' + (err.message || 'join failed'));
        });

        _socket.on('error:auth', function(err) {
            setStatus('error', '⬤ AUTH ERROR: ' + (err.message || 'invalid admin code'));
        });
    }

    function setStatus(cls, text) {
        var el = document.getElementById('conn-status');
        if (!el) return;
        el.className = cls;
        el.textContent = text;
    }

    // ── Incoming message ──────────────────────────────────────────────────────
    function handleIncomingMsg(payload) {
        var convId = payload.convId;
        var conv = appData.conversations[convId];

        if (!conv) {
            conv = {
                participants: payload.participants,
                displayName:  convDisplayName(payload.participants),
                messages:     [],
                unreadCount:  0,
                lastActivity: payload.timestamp || Date.now(),
                archived:     false
            };
            appData.conversations[convId] = conv;
        }

        var msg = {
            id:        genId(),
            from:      payload.from,
            text:      payload.text,
            timestamp: payload.timestamp || Date.now()
        };
        conv.messages.push(msg);
        conv.lastActivity = msg.timestamp;

        if (convId !== activeConvId) {
            conv.unreadCount = (conv.unreadCount || 0) + 1;
        }

        saveData();
        renderConvList();

        if (convId === activeConvId) {
            appendMessage(msg);
        }
    }

    // ── Render conv list ──────────────────────────────────────────────────────
    function renderConvList() {
        var q    = (document.getElementById('convSearch').value || '').toLowerCase();
        var list = document.getElementById('convList');
        list.innerHTML = '';

        var convs = Object.entries(appData.conversations).map(function(e){ return { id: e[0], conv: e[1] }; });

        function matches(entry) {
            if (!q) return true;
            if ((entry.conv.displayName || '').toLowerCase().includes(q)) return true;
            return (entry.conv.messages || []).some(function(m){ return m.text.toLowerCase().includes(q); });
        }

        var active   = convs.filter(function(e){ return !e.conv.archived; }).filter(matches);
        var archived = convs.filter(function(e){ return e.conv.archived;  }).filter(matches);

        active.sort(function(a,b){ return (b.conv.lastActivity||0) - (a.conv.lastActivity||0); });
        archived.sort(function(a,b){ return (b.conv.lastActivity||0) - (a.conv.lastActivity||0); });

        if (active.length === 0 && archived.length === 0) {
            list.innerHTML = '<div style="padding:16px;color:rgba(232,232,232,.3);font-size:10px;text-align:center;">No conversations. Click [+ NEW CONVERSATION] to start one.</div>';
            return;
        }

        active.forEach(function(e){ list.appendChild(buildConvItem(e.id, e.conv, false)); });

        if (archived.length > 0) {
            var lbl = document.createElement('div');
            lbl.className = 'conv-section-label';
            lbl.textContent = '── ARCHIVED ──';
            list.appendChild(lbl);
            archived.forEach(function(e){ list.appendChild(buildConvItem(e.id, e.conv, true)); });
        }
    }

    function buildConvItem(convId, conv, isArchived) {
        var el = document.createElement('div');
        el.className = 'conv-item' + (convId === activeConvId ? ' active' : '');
        el.onclick   = function(){ openConv(convId); };

        var lastMsg  = conv.messages.length ? conv.messages[conv.messages.length - 1] : null;
        var preview  = lastMsg ? lastMsg.text.substring(0,48) + (lastMsg.text.length > 48 ? '…' : '') : '(no messages yet)';
        var hasUnread = (conv.unreadCount || 0) > 0;

        el.innerHTML =
            '<div class="conv-top">' +
                '<span class="conv-name' + (hasUnread ? ' unread' : '') + '">' + escapeHtml((conv.displayName || convId).toUpperCase()) + '</span>' +
                (hasUnread
                    ? '<span class="unread-badge">' + conv.unreadCount + '</span>'
                    : '<span class="conv-time">' + relativeTime(conv.lastActivity || Date.now()) + '</span>') +
            '</div>' +
            '<div class="conv-preview' + (hasUnread ? ' unread' : '') + '">' + escapeHtml(preview) + '</div>';

        return el;
    }

    // ── Open conversation ─────────────────────────────────────────────────────
    window.openConv = function(convId) {
        activeConvId = convId;
        var conv = appData.conversations[convId];
        if (!conv) return;

        document.getElementById('detailEmpty').style.display  = 'none';
        document.getElementById('threadContent').style.display = 'flex';

        document.getElementById('threadTitle').textContent = (conv.displayName || convId).toUpperCase();
        document.getElementById('threadSub').textContent   = 'Participants: ' + (conv.participants || []).join(', ');

        var thread = document.getElementById('messageThread');
        thread.innerHTML = '';

        if (!conv.messages || conv.messages.length === 0) {
            thread.innerHTML = '<div style="color:rgba(232,232,232,.3);font-size:10px;text-align:center;margin-top:40px;">No messages yet. Send one!</div>';
        } else {
            conv.messages.forEach(function(msg){ appendMessage(msg); });
        }

        markAllRead();
        renderConvList();
    };

    function appendMessage(msg) {
        var thread   = document.getElementById('messageThread');
        var isMe     = msg.from === MY_HANDLE;
        var bubble   = document.createElement('div');
        bubble.className = 'msg-bubble ' + (isMe ? 'sent' : 'received');

        var now = new Date(msg.timestamp);
        var timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');

        bubble.innerHTML =
            '<div class="msg-sender">' + escapeHtml(isMe ? 'OVERSEER (You)' : msg.from) + '</div>' +
            '<div class="msg-body">' + escapeHtml(msg.text) + '</div>' +
            '<div class="msg-time">' + timeStr + '</div>';

        thread.appendChild(bubble);
        requestAnimationFrame(function(){ thread.scrollTop = thread.scrollHeight; });
    }

    // ── Send ──────────────────────────────────────────────────────────────────
    window.sendMessage = function() {
        if (!activeConvId) { showToast('Select a conversation first.', true); return; }

        var conv = appData.conversations[activeConvId];
        if (!conv) return;

        var text = (document.getElementById('msgTextarea').value || '').trim();
        if (!text) { showToast('Cannot send an empty message.', true); return; }

        if (!_connected || !_socket) { showToast('Not connected. Please wait.', true); return; }

        var to = (conv.participants || []).filter(function(p){ return p !== MY_HANDLE; });
        if (to.length === 0) return;

        _socket.emit('msg:send', { to: to, text: text });

        // Optimistic local store
        var msg = { id: genId(), from: MY_HANDLE, text: text, timestamp: Date.now() };
        conv.messages.push(msg);
        conv.lastActivity = msg.timestamp;
        document.getElementById('msgTextarea').value = '';
        saveData();
        appendMessage(msg);
        renderConvList();
        showToast('Message sent.');
    };

    window.handleKey = function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    };

    window.markAllRead = function() {
        if (!activeConvId) return;
        var conv = appData.conversations[activeConvId];
        if (!conv) return;
        conv.unreadCount = 0;
        saveData();
        renderConvList();
    };

    window.archiveConv = function() {
        if (!activeConvId) return;
        var conv = appData.conversations[activeConvId];
        if (!conv) return;
        conv.archived = !conv.archived;
        saveData();
        renderConvList();
        showToast(conv.archived ? 'Conversation archived.' : 'Conversation restored.');
    };

    // ── New conversation modal ────────────────────────────────────────────────
    window.openComposeModal = function() {
        var modal = document.getElementById('compose-modal');
        var rList = document.getElementById('recipient-list');
        var noMsg = document.getElementById('no-roster-msg');

        rList.innerHTML = '';

        if (_socket && _connected) _socket.emit('msg:get-roster');

        // Gather known handles from existing convs + live roster
        var known = new Set(_roster);
        Object.values(appData.conversations).forEach(function(c) {
            (c.participants || []).forEach(function(p) {
                if (p !== MY_HANDLE) known.add(p);
            });
        });

        var handles = Array.from(known).sort();

        if (handles.length === 0) {
            noMsg.style.display = 'block';
            rList.style.display = 'none';
        } else {
            noMsg.style.display = 'none';
            rList.style.display = 'flex';

            handles.forEach(function(h) {
                var item  = document.createElement('div');
                item.className = 'recipient-item';
                var cbId = 'rcpt_ov_' + h;
                item.innerHTML =
                    '<input type="checkbox" id="' + cbId + '" value="' + escapeHtml(h) + '">' +
                    '<label for="' + cbId + '">' + escapeHtml(h) + '</label>';
                item.querySelector('label').addEventListener('click', function(e) {
                    e.preventDefault();
                    var cb = document.getElementById(cbId);
                    cb.checked = !cb.checked;
                });
                rList.appendChild(item);
            });
        }

        modal.classList.add('visible');
    };

    window.closeComposeModal = function() {
        document.getElementById('compose-modal').classList.remove('visible');
    };

    window.confirmCompose = function() {
        var checked = Array.from(document.querySelectorAll('#recipient-list input[type="checkbox"]:checked'))
            .map(function(cb){ return cb.value; });

        if (checked.length === 0) { showToast('Select at least one recipient.', true); return; }

        var participants = [MY_HANDLE].concat(checked);
        var convId       = mkConvId(participants);

        if (!appData.conversations[convId]) {
            appData.conversations[convId] = {
                participants: participants.slice().sort(),
                displayName:  convDisplayName(participants.slice().sort()),
                messages:     [],
                unreadCount:  0,
                lastActivity: Date.now(),
                archived:     false
            };
            saveData();
        }

        closeComposeModal();
        openConv(convId);
    };

    document.getElementById('compose-modal').addEventListener('click', function(e) {
        if (e.target === this) closeComposeModal();
    });

    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg, isError) {
        var t = document.getElementById('statusToast');
        t.textContent = msg;
        t.className   = isError ? 'error visible' : 'visible';
        clearTimeout(t._timer);
        t._timer = setTimeout(function(){ t.className = isError ? 'error' : ''; }, 3500);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    renderConvList();
    initSocket();

})();
</script>
</body>
</html>
