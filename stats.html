<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallout Pipboy Stats</title>
    <style>
        /* ===========================
           FALLOUT PIPBOY STATS STYLE
           =========================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background-color: #0a0a0a;
            color: #4ade80;
            font-family: 'Courier New', monospace;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(58, 102, 20, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(58, 102, 20, 0.1) 0%, transparent 50%);
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background-color: #1a1a1a;
            border: 3px solid #4ade80;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.4);
        }

        .pip-title {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #4ade80;
            text-shadow: 0 0 10px #4ade80, 0 0 20px rgba(74, 222, 128, 0.5);
            animation: glow 2s ease-in-out infinite;
            margin-bottom: 10px;
        }

        .character-name {
            font-size: 16px;
            color: #fbbf24;
            text-shadow: 0 0 5px #fbbf24;
            letter-spacing: 2px;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 10px #4ade80, 0 0 20px rgba(74, 222, 128, 0.5);
            }
            50% {
                text-shadow: 0 0 15px #4ade80, 0 0 30px rgba(74, 222, 128, 0.8);
            }
        }

        /* ===== SUBTAB NAVIGATION ===== */
        .subtab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #4ade80;
            padding-bottom: 10px;
        }

        .subtab-button {
            background-color: #0a0a0a;
            border: 2px solid #4ade80;
            color: #4ade80;
            padding: 10px 16px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px #4ade80;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }

        .subtab-button:hover {
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.8);
            border-color: #fbbf24;
            color: #fbbf24;
            text-shadow: 0 0 10px #fbbf24;
        }

        .subtab-button.active {
            background-color: #2d5016;
            border-color: #fbbf24;
            color: #fbbf24;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.8);
            text-shadow: 0 0 10px #fbbf24;
        }

        .subtab-content {
            display: none;
        }

        .subtab-content.active {
            display: block;
        }

        /* ===== STATS SECTIONS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background-color: #1a1a1a;
            border: 2px solid #4ade80;
            padding: 20px;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.6);
            border-color: #fbbf24;
        }

        .stat-title {
            color: #fbbf24;
            text-shadow: 0 0 5px #fbbf24;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px solid #4ade80;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            font-size: 13px;
        }

        .stat-label {
            color: #4ade80;
            text-shadow: 0 0 3px #4ade80;
        }

        .stat-value {
            color: #fbbf24;
            text-shadow: 0 0 5px #fbbf24;
            font-weight: bold;
            font-size: 14px;
        }

        /* ===== STAT BARS ===== */
        .stat-bar-container {
            margin: 15px 0;
        }

        .stat-bar-label {
            color: #4ade80;
            font-size: 12px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .stat-bar {
            width: 100%;
            height: 15px;
            background-color: #0a0a0a;
            border: 1px solid #4ade80;
            overflow: hidden;
            box-shadow: inset 0 0 5px rgba(74, 222, 128, 0.2);
        }

        .stat-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #fbbf24);
            box-shadow: 0 0 10px #4ade80;
            transition: width 0.5s ease;
        }

        /* ===== SKILLS SECTION ===== */
        .skills-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .skill-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #0a0a0a;
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 3px;
        }

        .skill-name {
            color: #4ade80;
            font-size: 12px;
            text-shadow: 0 0 3px #4ade80;
            font-weight: bold;
        }

        .skill-special {
            color: #9333ea;
            font-size: 10px;
            text-shadow: 0 0 2px #9333ea;
            font-style: italic;
        }

        .skill-value {
            color: #fbbf24;
            font-weight: bold;
            font-size: 12px;
            min-width: 30px;
            text-align: center;
        }

        /* ===== SPECIAL SECTION ===== */
        .special-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        .special-stat {
            background-color: #0a0a0a;
            border: 2px solid #4ade80;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.2);
        }

        .special-letter {
            color: #fbbf24;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 3px #fbbf24;
            margin-bottom: 8px;
        }

        .special-value {
            color: #4ade80;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px #4ade80;
        }

        .special-name {
            font-size: 10px;
            color: #4ade80;
            margin-top: 5px;
        }

        .special-skills {
            font-size: 9px;
            color: #9333ea;
            margin-top: 5px;
            text-shadow: 0 0 2px #9333ea;
            max-height: 40px;
            overflow-y: auto;
            line-height: 1.2;
        }

        /* ===== PERKS SECTION ===== */
        .perks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .perk-card {
            background-color: #0a0a0a;
            border: 2px solid #8b5cf6;
            padding: 15px;
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
        }

        .perk-name {
            color: #8b5cf6;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 3px #8b5cf6;
        }

        /* ===== STATUS EFFECTS ===== */
        .effects-box {
            background-color: #1a1a1a;
            border: 2px solid #ff6b6b;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.2);
        }

        .effects-title {
            color: #ff6b6b;
            text-shadow: 0 0 5px #ff6b6b;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px solid #ff6b6b;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .effects-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .effect-section {
            background-color: #0a0a0a;
            border: 1px solid rgba(255, 107, 107, 0.3);
            padding: 12px;
            border-radius: 3px;
            max-height: 200px;
            overflow-y: auto;
        }

        .effect-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 6px 0;
            padding: 6px;
            background-color: #1a1a1a;
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 2px;
        }

        .effect-label {
            color: #4ade80;
            text-shadow: 0 0 3px #4ade80;
            font-size: 11px;
        }

        .effect-badge {
            background-color: #ff6b6b;
            color: #0a0a0a;
            padding: 3px 8px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: bold;
            text-shadow: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .effects-content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .skills-grid {
                grid-template-columns: 1fr;
            }
            .subtab-nav {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="pip-title">PIP-BOY 3000</div>
            <div class="character-name" id="characterName">VAULT DWELLER</div>
        </div>

        <!-- SUBTAB NAVIGATION -->
        <div class="subtab-nav">
            <button class="subtab-button active" onclick="switchTab(event, 'stats')">Stats</button>
            <button class="subtab-button" onclick="switchTab(event, 'perks')">Perks</button>
        </div>

        <!-- STATS TAB CONTENT -->
        <div id="stats" class="subtab-content active">
            <div class="main-grid">
                <!-- SKILLS -->
                <div class="stat-box">
                    <div class="stat-title">Skills</div>
                    <div class="skills-grid" id="skillsGrid"></div>
                </div>

                <!-- STATUS EFFECTS & BOOSTS -->
                <div class="effects-box">
                    <div class="effects-title">⚠ Status Effects & Boosts</div>
                    <div class="effects-content">
                        <div class="effect-section">
                            <div style="color: #ff6b6b; font-weight: bold; margin-bottom: 8px;">☢ Status Effects</div>
                            <div id="effectsList"></div>
                        </div>
                        <div class="effect-section">
                            <div style="color: #ff6b6b; font-weight: bold; margin-bottom: 8px;">✦ Stat Boosts</div>
                            <div id="boostsList"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- S.P.E.C.I.A.L STATS -->
            <div class="stat-box" style="margin-bottom: 30px;">
                <div class="stat-title">S.P.E.C.I.A.L Attributes</div>
                <div class="special-grid">
                    <div class="special-stat">
                        <div class="special-letter">S</div>
                        <div class="special-value">5</div>
                        <div class="special-name">Strength</div>
                        <div class="special-skills" id="skills-strength"></div>
                    </div>
                    <div class="special-stat">
                        <div class="special-letter">P</div>
                        <div class="special-value">6</div>
                        <div class="special-name">Perception</div>
                        <div class="special-skills" id="skills-perception"></div>
                    </div>
                    <div class="special-stat">
                        <div class="special-letter">E</div>
                        <div class="special-value">7</div>
                        <div class="special-name">Endurance</div>
                        <div class="special-skills" id="skills-endurance"></div>
                    </div>
                    <div class="special-stat">
                        <div class="special-letter">C</div>
                        <div class="special-value">4</div>
                        <div class="special-name">Charisma</div>
                        <div class="special-skills" id="skills-charisma"></div>
                    </div>
                    <div class="special-stat">
                        <div class="special-letter">I</div>
                        <div class="special-value">5</div>
                        <div class="special-name">Intelligence</div>
                        <div class="special-skills" id="skills-intelligence"></div>
                    </div>
                    <div class="special-stat">
                        <div class="special-letter">A</div>
                        <div class="special-value">5</div>
                        <div class="special-name">Agility</div>
                        <div class="special-skills" id="skills-agility"></div>
                    </div>
                    <div class="special-stat">
                        <div class="special-letter">L</div>
                        <div class="special-value">3</div>
                        <div class="special-name">Luck</div>
                        <div class="special-skills" id="skills-luck"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PERKS TAB CONTENT -->
        <div id="perks" class="subtab-content">
            <div class="stat-box">
                <div class="stat-title">Character Perks</div>
                <div class="perks-grid" id="perksGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // Skills with SPECIAL alignments
        const SKILLS_BY_SPECIAL = {
            strength: ['Melee Weapons', 'Big Guns', 'Unarmed'],
            perception: ['Small Guns', 'Energy Weapons'],
            endurance: ['Survival', 'Explosives'],
            charisma: ['Barter', 'Speech'],
            intelligence: ['Science', 'Repair', 'Medicine'],
            agility: ['Sneak', 'Lockpick'],
            luck: []
        };

        // Flatten skills list
        const SKILLS = [
            'Barter', 'Small Guns', 'Big Guns', 'Melee Weapons',
            'Energy Weapons', 'Explosives', 'Lockpick', 'Medicine',
            'Science', 'Repair', 'Sneak', 'Speech', 'Unarmed', 'Survival'
        ];

        // Get SPECIAL for skill
        function getSpecialForSkill(skill) {
            for (const [special, skills] of Object.entries(SKILLS_BY_SPECIAL)) {
                if (skills.includes(skill)) {
                    return special.charAt(0).toUpperCase() + special.slice(1);
                }
            }
            return 'Unknown';
        }

        // ===== SWITCH TABS =====
        function switchTab(event, tabName) {
            document.getElementById('stats').classList.remove('active');
            document.getElementById('perks').classList.remove('active');
            
            const buttons = document.querySelectorAll('.subtab-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // ===== UPDATE DISPLAY =====
        function updateDisplay(playerData) {
            // Update skills grid
            const skillsGrid = document.getElementById('skillsGrid');
            skillsGrid.innerHTML = '';
            
            SKILLS.forEach(skill => {
                const special = getSpecialForSkill(skill);
                const skillDiv = document.createElement('div');
                skillDiv.className = 'skill-item';
                skillDiv.innerHTML = `
                    <div>
                        <div class="skill-name">${skill}</div>
                        <div class="skill-special">${special}</div>
                    </div>
                    <div class="skill-value">0</div>
                `;
                skillsGrid.appendChild(skillDiv);
            });

            // Update SPECIAL skills lists
            for (const [special, skillsList] of Object.entries(SKILLS_BY_SPECIAL)) {
                const skillsElement = document.getElementById(`skills-${special}`);
                skillsElement.innerHTML = skillsList.map(s => `<div>${s}</div>`).join('');
            }
        }

        // ===== REMOVE STATUS EFFECT =====
        function removeStatusEffect(effect) {
            console.log('Removed status effect:', effect);
        }

        // ===== ADD STAT BOOST =====
        function addStatBoost(statName, boostAmount) {
            console.log(`Added ${boostAmount} to ${statName}`);
        }

        // ===== REMOVE STAT BOOST =====
        function removeStatBoost(statName, boostAmount) {
            console.log(`Removed ${boostAmount} from ${statName}`);
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', function() {
            updateDisplay({});
        });
    </script>
</body>
</html>
