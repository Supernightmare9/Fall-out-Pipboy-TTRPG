<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallout Pipboy Stats</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #2b2b2b; color: #ffffff; }
        .container { padding: 20px; }
        .header { font-size: 24px; margin-bottom: 20px; }
        .stat { margin: 10px 0; }
        .pipboy { background: #1c1c1c; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Pip-Boy Character Stats</div>
        <div class="pipboy">
            <div class="stat"><strong>Experience Points:</strong> 1500</div>
            <div class="stat"><strong>S.P.E.C.I.A.L:</strong></div>
            <ul class="stat">
                <li>Strength: 5</li>
                <li>Perception: 6</li>
                <li>Endurance: 7</li>
                <li>Charisma: 4</li>
                <li>Intelligence: 5</li>
                <li>Agility: 5</li>
                <li>Luck: 3</li>
            </ul>
            <div class="stat"><strong>Ability Points:</strong> 10</div>
            <div class="stat"><strong>Health:</strong> 80</div>
            <div class="stat"><strong>Action Points:</strong> 10</div>
        </div>
    </div>
</body>
</html>
