<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Fallout Pipboy Login</title><link rel="stylesheet" href="css/style.css"></head><body><div class="login-container"><h1>Welcome to Fallout Pipboy</h1><form id="loginForm" onsubmit="handleLogin(event)"><label for="username">Username:</label><input type="text" id="username" name="username" required><label for="password">Password:</label><input type="password" id="password" name="password" required><button type="submit">Login</button></form></div><script>function handleLogin(event) {event.preventDefault(); const username = document.getElementById('username').value; const password = document.getElementById('password').value; const validAccounts = {'Dillon': 'test','Vault Dweller': 'vault111','Survivor': '2077','Agent': 'minutemen','Overseer': 'vault101'}; if (validAccounts[username] === password) {const playerData = {characterName: username,vault: '111',level: 1,health: 100,xp: 0}; localStorage.setItem('currentPlayer', JSON.stringify(playerData)); window.location.href = 'character.html';} else {alert('Invalid username or password!');}}</script></body></html>
