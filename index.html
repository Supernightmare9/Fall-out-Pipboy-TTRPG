<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallout Pipboy Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="pip-boy-logo">PIP-BOY</div>
            <div class="pip-version">3000</div>
            <h1>VAULT NETWORK</h1>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">VAULT DWELLER:</label>
                <input type="text" id="username" name="username" placeholder="Enter Username" required>
            </div>
            
            <div class="form-group">
                <label for="password">SECURITY CODE:</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required>
            </div>
            
            <button type="submit">ACCESS VAULT</button>
        </form>

        <div class="status-bar">
            <div class="status-item">
                <span class="status-indicator"></span>
                <span>SYSTEM ONLINE</span>
            </div>
            <div class="status-item">
                <span>VAULT 111</span>
            </div>
        </div>
    </div>

    <script>
        // Initialize IndexedDB
        let db;
        const DB_NAME = 'PipBoyGameDB';
        const STORE_NAME = 'players';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve();
                };

                request.onupgradeneeded = (event) => {
                    db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                    }
                };
            });
        }

        // Get player data from IndexedDB
        function getPlayerDataFromDB() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(1);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    resolve(request.result || null);
                };
            });
        }

        // Save player data to IndexedDB
        function savePlayerDataToDB(playerData) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put({ ...playerData, id: 1 });

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    localStorage.setItem('currentPlayer', JSON.stringify(playerData));
                    resolve();
                };
            });
        }

        // Initialize database on page load
        window.addEventListener('DOMContentLoaded', async function() {
            try {
                await initDB();
            } catch (error) {
                console.error('Error initializing database:', error);
            }
        });

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const validAccounts = {
                'Dillon': 'test',
                'Vault Dweller': 'vault111',
                'Survivor': '2077',
                'Agent': 'minutemen',
                'Overseer': 'vault101'
            };
            
            if (validAccounts[username] === password) {
                try {
                    // Check if player already exists in database
                    const existingPlayer = await getPlayerDataFromDB();
                    
                    let playerData;
                    if (existingPlayer && existingPlayer.characterName === username) {
                        // Player exists - preserve their existing data (XP, level, health)
                        playerData = existingPlayer;
                    } else {
                        // New player - create fresh data
                        playerData = {
                            id: 1,
                            characterName: username,
                            vault: '111',
                            level: 1,
                            health: 100,
                            xp: 0
                        };
                    }
                    
                    // Save player data to IndexedDB
                    await savePlayerDataToDB(playerData);
                    // Redirect to character page
                    window.location.href = 'character.html';
                } catch (error) {
                    console.error('Error during login:', error);
                    alert('Error loading player data!');
                }
            } else {
                alert('Invalid Vault Dweller credentials!');
            }
        }
    </script>
</body>
</html>
