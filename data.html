<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallout Pipboy Character</title>
    <style>
        /* ===========================
           FALLOUT PIPBOY CHARACTER SHEET
           =========================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background-color: #0a0a0a;
            color: #4ade80;
            font-family: 'Courier New', monospace;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(58, 102, 20, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(58, 102, 20, 0.1) 0%, transparent 50%);
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background-color: #1a1a1a;
            border: 3px solid #4ade80;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.4);
        }

        .pip-title {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #4ade80;
            text-shadow: 0 0 10px #4ade80, 0 0 20px rgba(74, 222, 128, 0.5);
            animation: glow 2s ease-in-out infinite;
            margin-bottom: 10px;
        }

        .character-name {
            font-size: 16px;
            color: #fbbf24;
            text-shadow: 0 0 5px #fbbf24;
            letter-spacing: 2px;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 10px #4ade80, 0 0 20px rgba(74, 222, 128, 0.5);
            }
            50% {
                text-shadow: 0 0 15px #4ade80, 0 0 30px rgba(74, 222, 128, 0.8);
            }
        }

        /* ===== SUBTAB NAVIGATION ===== */
        .subtab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #4ade80;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .subtab-button {
            background-color: #0a0a0a;
            border: 2px solid #4ade80;
            color: #4ade80;
            padding: 10px 16px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px #4ade80;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }

        .subtab-button:hover {
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.8);
            border-color: #fbbf24;
            color: #fbbf24;
            text-shadow: 0 0 10px #fbbf24;
        }

        .subtab-button.active {
            background-color: #2d5016;
            border-color: #fbbf24;
            color: #fbbf24;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.8);
            text-shadow: 0 0 10px #fbbf24;
        }

        .subtab-content {
            display: none;
        }

        .subtab-content.active {
            display: block;
        }

        /* ===== CHARACTER PROFILE SECTION ===== */
        .character-profile {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .character-image-box {
            background-color: #1a1a1a;
            border: 2px solid #4ade80;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }

        .character-image {
            width: 100%;
            height: 300px;
            background-color: #0a0a0a;
            border: 1px solid rgba(74, 222, 128, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            border-radius: 3px;
            overflow: hidden;
        }

        .character-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .character-image-placeholder {
            color: #4ade80;
            font-size: 12px;
            opacity: 0.6;
        }

        .image-upload-btn {
            background-color: #2d5016;
            border: 2px solid #4ade80;
            color: #4ade80;
            padding: 10px 16px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px #4ade80;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
            width: 100%;
        }

        .image-upload-btn:hover {
            background-color: #3d6b1f;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.8);
            border-color: #fbbf24;
            color: #fbbf24;
            text-shadow: 0 0 10px #fbbf24;
        }

        .character-info-box {
            background-color: #1a1a1a;
            border: 2px solid #4ade80;
            padding: 20px;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }

        .info-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(74, 222, 128, 0.2);
        }

        .info-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .info-label {
            color: #fbbf24;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0 0 3px #fbbf24;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-value {
            color: #4ade80;
            font-size: 13px;
            text-shadow: 0 0 3px #4ade80;
        }

        .info-input {
            background-color: #0a0a0a;
            border: 1px solid #4ade80;
            color: #4ade80;
            padding: 8px 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-shadow: 0 0 5px #4ade80;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 5px rgba(74, 222, 128, 0.1);
        }

        .info-input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.6), inset 0 0 5px rgba(74, 222, 128, 0.1);
            color: #fbbf24;
        }

        .info-textarea {
            background-color: #0a0a0a;
            border: 1px solid #4ade80;
            color: #4ade80;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            text-shadow: 0 0 5px #4ade80;
            width: 100%;
            height: 150px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 5px rgba(74, 222, 128, 0.1);
            resize: vertical;
        }

        .info-textarea:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.6), inset 0 0 5px rgba(74, 222, 128, 0.1);
            color: #fbbf24;
        }

        /* ===== BACKSTORY SECTION ===== */
        .backstory-section {
            background-color: #1a1a1a;
            border: 2px solid #4ade80;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }

        .section-title {
            color: #fbbf24;
            text-shadow: 0 0 5px #fbbf24;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid #4ade80;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .backstory-text {
            color: #4ade80;
            font-size: 12px;
            line-height: 1.8;
            text-shadow: 0 0 3px #4ade80;
        }

        /* ===== BUTTON SECTION ===== */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-button {
            flex: 1;
            min-width: 120px;
            background-color: #2d5016;
            border: 2px solid #4ade80;
            color: #4ade80;
            padding: 12px 16px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px #4ade80;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }

        .action-button:hover {
            background-color: #3d6b1f;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.8);
            border-color: #fbbf24;
            color: #fbbf24;
            text-shadow: 0 0 10px #fbbf24;
            transform: translateY(-2px);
        }

        /* ===== NAVIGATION ===== */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .nav-button {
            flex: 1;
            min-width: 150px;
            background-color: #2d5016;
            border: 2px solid #4ade80;
            color: #4ade80;
            padding: 12px 20px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px #4ade80;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }

        .nav-button:hover {
            background-color: #3d6b1f;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.8);
            border-color: #fbbf24;
            color: #fbbf24;
            text-shadow: 0 0 10px #fbbf24;
            transform: translateY(-2px);
        }

        .message {
            margin-top: 15px;
            font-size: 12px;
            color: #4ade80;
            text-shadow: 0 0 3px #4ade80;
            min-height: 20px;
        }

        .message.success {
            color: #4ade80;
            text-shadow: 0 0 5px #4ade80;
        }

        .message.error {
            color: #ff6b6b;
            text-shadow: 0 0 5px #ff6b6b;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .character-profile {
                grid-template-columns: 1fr;
            }

            .header {
                padding: 20px;
            }

            .pip-title {
                font-size: 24px;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .nav-button {
                width: 100%;
            }

            .subtab-nav {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="pip-title">CHARACTER SHEET</div>
            <div class="character-name" id="characterNameDisplay">VAULT DWELLER</div>
        </div>

        <!-- SUBTAB NAVIGATION -->
        <div class="subtab-nav">
            <button class="subtab-button active" data-tab="overview">OVERVIEW</button>
            <button class="subtab-button" data-tab="backstory">BACKSTORY</button>
        </div>

        <!-- OVERVIEW TAB -->
        <div id="overview" class="subtab-content active">
            <div class="character-profile">
                <!-- CHARACTER IMAGE -->
                <div class="character-image-box">
                    <div class="section-title" style="margin-bottom: 15px;">Character Portrait</div>
                    <div class="character-image" id="characterImageContainer">
                        <div class="character-image-placeholder">No image uploaded</div>
                    </div>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                    <button class="image-upload-btn" onclick="document.getElementById('imageUpload').click()">UPLOAD IMAGE</button>
                </div>

                <!-- CHARACTER INFO -->
                <div class="character-info-box">
                    <div class="section-title">Character Information</div>
                    
                    <div class="info-item">
                        <div class="info-label">Character Name</div>
                        <input type="text" class="info-input" id="charName" placeholder="Enter character name" value="Vault Dweller">
                    </div>

                    <div class="info-item">
                        <div class="info-label">Race</div>
                        <select class="info-input" id="charRace" style="cursor: pointer;">
                            <option value="">Select a race...</option>
                            <option value="Human">Human</option>
                            <option value="Ghoul">Ghoul</option>
                            <option value="Super Mutant">Super Mutant</option>
                            <option value="Synth">Synth</option>
                            <option value="Mirelurk">Mirelurk</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="info-item">
                        <div class="info-label">Vault Number</div>
                        <input type="text" class="info-input" id="charVault" placeholder="e.g., Vault 111">
                    </div>

                    <div class="info-item">
                        <div class="info-label">Occupation/Class</div>
                        <input type="text" class="info-input" id="charClass" placeholder="e.g., Scavenger, Soldier">
                    </div>

                    <div class="info-item">
                        <div class="info-label">Alignment</div>
                        <select class="info-input" id="charAlignment" style="cursor: pointer;">
                            <option value="">Select alignment...</option>
                            <option value="Good">Good (Helpful)</option>
                            <option value="Neutral">Neutral (Survivor)</option>
                            <option value="Evil">Evil (Raider)</option>
                            <option value="Chaotic">Chaotic (Wild Card)</option>
                        </select>
                    </div>

                    <div class="button-group">
                        <button class="action-button" onclick="saveCharacterData()">SAVE DATA</button>
                        <button class="action-button" onclick="clearCharacterData()">CLEAR ALL</button>
                    </div>
                    <div class="message" id="saveMessage"></div>
                </div>
            </div>
        </div>

        <!-- BACKSTORY TAB -->
        <div id="backstory" class="subtab-content">
            <div class="backstory-section">
                <div class="section-title">Character Backstory</div>
                <textarea class="info-textarea" id="characterBackstory" placeholder="Write your character's backstory here... Their origins, motivations, past experiences, and what drives them in the wasteland..."></textarea>
                <div class="button-group">
                    <button class="action-button" onclick="saveBackstory()">SAVE BACKSTORY</button>
                    <button class="action-button" onclick="clearBackstory()">CLEAR</button>
                </div>
                <div class="message" id="backstoryMessage"></div>
            </div>
        </div>

        <!-- NAVIGATION -->
        <div class="nav-buttons">
            <button class="nav-button" onclick="window.location.href='stats.html'">← STATS</button>
            <button class="nav-button" onclick="window.location.href='inventory.html'">INVENTORY</button>
            <button class="nav-button" onclick="window.location.href='data.html'">DATA</button>
            <button class="nav-button" onclick="window.location.href='index.html'">LOGOUT →</button>
        </div>
    </div>

    <script>
        // ===== TAB SWITCHING =====
        function switchTab(tabName) {
            document.getElementById('overview').classList.remove('active');
            document.getElementById('backstory').classList.remove('active');
            
            const buttons = document.querySelectorAll('.subtab-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
        }

        // ===== IMAGE UPLOAD =====
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imageContainer = document.getElementById('characterImageContainer');
                    imageContainer.innerHTML = `<img src="${event.target.result}" alt="Character Portrait">`;
                    localStorage.setItem('characterImage', event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        // ===== SAVE CHARACTER DATA =====
        function saveCharacterData() {
            const charName = document.getElementById('charName').value;
            const charRace = document.getElementById('charRace').value;
            const charVault = document.getElementById('charVault').value;
            const charClass = document.getElementById('charClass').value;
            const charAlignment = document.getElementById('charAlignment').value;

            const characterData = {
                name: charName,
                race: charRace,
                vault: charVault,
                class: charClass,
                alignment: charAlignment
            };

            localStorage.setItem('characterData', JSON.stringify(characterData));
            document.getElementById('characterNameDisplay').textContent = charName || 'VAULT DWELLER';

            const message = document.getElementById('saveMessage');
            message.textContent = '✓ Character data saved successfully!';
            message.className = 'message success';
            setTimeout(() => {
                message.textContent = '';
            }, 3000);
        }

        // ===== SAVE BACKSTORY =====
        function saveBackstory() {
            const backstory = document.getElementById('characterBackstory').value;
            localStorage.setItem('characterBackstory', backstory);

            const message = document.getElementById('backstoryMessage');
            message.textContent = '✓ Backstory saved successfully!';
            message.className = 'message success';
            setTimeout(() => {
                message.textContent = '';
            }, 3000);
        }

        // ===== CLEAR CHARACTER DATA =====
        function clearCharacterData() {
            if (confirm('Are you sure you want to clear all character data?')) {
                document.getElementById('charName').value = 'Vault Dweller';
                document.getElementById('charRace').value = '';
                document.getElementById('charVault').value = '';
                document.getElementById('charClass').value = '';
                document.getElementById('charAlignment').value = '';
                document.getElementById('characterImageContainer').innerHTML = '<div class="character-image-placeholder">No image uploaded</div>';
                
                localStorage.removeItem('characterData');
                localStorage.removeItem('characterImage');

                const message = document.getElementById('saveMessage');
                message.textContent = '✓ Character data cleared!';
                message.className = 'message success';
                setTimeout(() => {
                    message.textContent = '';
                }, 3000);
            }
        }

        // ===== CLEAR BACKSTORY =====
        function clearBackstory() {
            if (confirm('Are you sure you want to clear the backstory?')) {
                document.getElementById('characterBackstory').value = '';
                localStorage.removeItem('characterBackstory');

                const message = document.getElementById('backstoryMessage');
                message.textContent = '✓ Backstory cleared!';
                message.className = 'message success';
                setTimeout(() => {
                    message.textContent = '';
                }, 3000);
            }
        }

        // ===== LOAD CHARACTER DATA =====
        function loadCharacterData() {
            const savedData = localStorage.getItem('characterData');
            if (savedData) {
                const data = JSON.parse(savedData);
                document.getElementById('charName').value = data.name || 'Vault Dweller';
                document.getElementById('charRace').value = data.race || '';
                document.getElementById('charVault').value = data.vault || '';
                document.getElementById('charClass').value = data.class || '';
                document.getElementById('charAlignment').value = data.alignment || '';
                document.getElementById('characterNameDisplay').textContent = data.name || 'VAULT DWELLER';
            }

            const savedImage = localStorage.getItem('characterImage');
            if (savedImage) {
                document.getElementById('characterImageContainer').innerHTML = `<img src="${savedImage}" alt="Character Portrait">`;
            }

            const savedBackstory = localStorage.getItem('characterBackstory');
            if (savedBackstory) {
                document.getElementById('characterBackstory').value = savedBackstory;
            }
        }

        // ===== ADD EVENT LISTENERS =====
        document.querySelectorAll('.subtab-button').forEach(button => {
            button.addEventListener('click', function() {
                const tabName = this.getAttribute('data-tab');
                switchTab(tabName);
            });
        });

        // Load data on page load
        window.addEventListener('DOMContentLoaded', function() {
            loadCharacterData();
        });
    </script>
</body>
</html>
