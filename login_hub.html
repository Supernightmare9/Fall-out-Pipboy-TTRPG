<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault 215 — Login Terminal</title>
    <style>
        /* =============================================
           VAULT 215 LOGIN HUB
           Central Gateway — Blue & Gold Theme
           ============================================= */

        :root {
            --overseer-blue: #0a1628;
            --overseer-blue-mid: #0d2045;
            --overseer-blue-bright: #1a3a6e;
            --overseer-blue-light: #2a5298;
            --overseer-gold: #d4a017;
            --overseer-gold-bright: #f0c040;
            --overseer-gold-dim: #8b6914;
            --overseer-white: #e8e8e8;
            --overseer-red: #cc2200;
            --overseer-green: #00cc66;
            --overseer-dark: #04080f;
            --overseer-darker: #020408;
            --overseer-border: #2a5298;
            --overseer-glow-gold: rgba(212, 160, 23, 0.6);
            --overseer-glow-blue: rgba(42, 82, 152, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background-color: var(--overseer-dark);
            color: var(--overseer-white);
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 15% 30%, rgba(42, 82, 152, 0.12) 0%, transparent 55%),
                radial-gradient(circle at 85% 70%, rgba(212, 160, 23, 0.08) 0%, transparent 55%);
        }

        /* ===== SCANLINE EFFECT ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.18),
                rgba(0, 0, 0, 0.18) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ===== HUB PANEL ===== */
        .hub-panel {
            background: var(--overseer-blue-mid);
            border: 3px solid var(--overseer-gold);
            box-shadow:
                0 0 40px var(--overseer-glow-gold),
                0 0 80px rgba(212, 160, 23, 0.2),
                inset 0 0 30px rgba(42, 82, 152, 0.15);
            padding: 50px 60px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .hub-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--overseer-gold), var(--overseer-gold-bright), var(--overseer-gold), transparent);
        }

        .hub-emblem {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--overseer-gold-dim);
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .hub-title {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 6px;
            color: var(--overseer-gold-bright);
            text-shadow: 0 0 20px var(--overseer-glow-gold), 0 0 40px rgba(212, 160, 23, 0.4);
            margin-bottom: 6px;
        }

        .hub-subtitle {
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--overseer-white);
            opacity: 0.5;
            margin-bottom: 30px;
        }

        .hub-divider {
            border: none;
            border-top: 1px solid;
            background: linear-gradient(90deg, transparent, var(--overseer-gold), transparent);
            margin: 0 0 36px 0;
            opacity: 0.6;
        }

        .hub-prompt {
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--overseer-white);
            opacity: 0.6;
            margin-bottom: 28px;
            text-transform: uppercase;
        }

        /* ===== LOGIN OPTIONS ===== */
        .login-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .login-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--overseer-blue);
            border: 2px solid var(--overseer-blue-light);
            padding: 28px 20px;
            cursor: pointer;
            text-decoration: none;
            color: var(--overseer-white);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .login-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 160, 23, 0.08), transparent);
            transition: left 0.4s ease;
        }

        .login-option:hover::before {
            left: 100%;
        }

        .login-option:hover {
            border-color: var(--overseer-gold);
            background: var(--overseer-blue-bright);
            box-shadow: 0 0 20px rgba(212, 160, 23, 0.3), inset 0 0 15px rgba(42, 82, 152, 0.2);
            transform: translateY(-2px);
        }

        .login-option-icon {
            font-size: 36px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 8px rgba(212, 160, 23, 0.5));
        }

        .login-option-label {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--overseer-gold);
            margin-bottom: 6px;
        }

        .login-option-desc {
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--overseer-white);
            opacity: 0.5;
            text-align: center;
        }

        /* ===== OVERSEER OPTION STYLING ===== */
        .login-option.overseer {
            border-color: rgba(42, 82, 152, 0.7);
        }

        .login-option.overseer:hover {
            border-color: var(--overseer-gold-bright);
            box-shadow: 0 0 25px rgba(212, 160, 23, 0.4), 0 0 50px rgba(42, 82, 152, 0.3);
        }

        /* ===== PLAYER OPTION STYLING ===== */
        .login-option.player {
            border-color: rgba(0, 204, 102, 0.4);
        }

        .login-option.player .login-option-label {
            color: var(--overseer-green);
            text-shadow: 0 0 8px rgba(0, 204, 102, 0.5);
        }

        .login-option.player .login-option-icon {
            filter: drop-shadow(0 0 8px rgba(0, 204, 102, 0.5));
        }

        .login-option.player:hover {
            border-color: var(--overseer-green);
            box-shadow: 0 0 20px rgba(0, 204, 102, 0.3), inset 0 0 15px rgba(0, 204, 102, 0.1);
        }

        /* ===== FOOTER ===== */
        .hub-footer {
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--overseer-white);
            opacity: 0.25;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* ===== BACK LINK ===== */
        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--overseer-gold-dim);
            text-decoration: none;
            text-transform: uppercase;
            border: 1px solid var(--overseer-gold-dim);
            padding: 6px 14px;
            transition: all 0.2s;
        }

        .back-link:hover {
            color: var(--overseer-gold);
            border-color: var(--overseer-gold);
            background: rgba(212, 160, 23, 0.08);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 500px) {
            .hub-panel {
                padding: 36px 24px;
                margin: 16px;
            }
            .hub-title {
                font-size: 20px;
                letter-spacing: 3px;
            }
            .login-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="hub-panel">
    <div class="hub-emblem">⬡ Vault-Tec Authority — Vault 215 ⬡</div>
    <div class="hub-title">VAULT 215</div>
    <div class="hub-subtitle">LOGIN TERMINAL — SELECT ACCESS MODE</div>
    <hr class="hub-divider">

    <div class="hub-prompt">Identify Access Mode</div>

    <div class="login-options">
        <!-- Overseer Console Option -->
        <a href="overseer.html" class="login-option overseer">
            <div class="login-option-icon">🛡️</div>
            <div class="login-option-label">Overseer Console</div>
            <div class="login-option-desc">Command Center<br>Restricted Access</div>
        </a>

        <!-- Player Login Option -->
        <a href="index.html" class="login-option player">
            <div class="login-option-icon">👤</div>
            <div class="login-option-label">Player Login</div>
            <div class="login-option-desc">Vault Dweller<br>Character Access</div>
        </a>
    </div>

    <div class="hub-footer">
        Vault-Tec Corporation • All Systems Monitored<br>
        Unauthorized Access Will Be Prosecuted
    </div>
</div>

</body>
</html>
